<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سامانه آزمون مدرسه</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Vazirmatn', sans-serif; background: #F8FAFC; color: #1E293B; }
    button { cursor: pointer; font-family: inherit; }
    input, textarea, select { font-family: inherit; }
  </style>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // توابع کمکی
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    const generateCode = (existing) => {
      let code;
      do { code = String(Math.floor(100000 + Math.random() * 900000)); } while (existing.includes(code));
      return code;
    };

    const db = {
      get: (key) => JSON.parse(localStorage.getItem(key) || 'null'),
      set: (key, value) => localStorage.setItem(key, JSON.stringify(value)),
      getAll: (prefix) => {
        const items = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith(prefix)) {
            items.push(JSON.parse(localStorage.getItem(key)));
          }
        }
        return items;
      },
      delete: (key) => localStorage.removeItem(key)
    };

    // کامپوننت‌های UI
    const Button = ({ children, onClick, variant = 'primary', style }) => {
      const colors = {
        primary: { background: '#2563EB', color: '#fff' },
        success: { background: '#16A34A', color: '#fff' },
        danger: { background: '#DC2626', color: '#fff' },
        ghost: { background: '#fff', color: '#334155', border: '1.5px solid #E2E8F0' }
      };
      return (
        <button onClick={onClick} style={{
          padding: '10px 18px', borderRadius: 8, fontSize: 14, fontWeight: 700,
          border: 'none', ...colors[variant], ...style
        }}>{children}</button>
      );
    };

    const Input = ({ value, onChange, placeholder, type = 'text', style }) => (
      <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={{
        width: '100%', padding: '12px 16px', border: '1.5px solid #E2E8F0',
        borderRadius: 8, fontSize: 14, outline: 'none', ...style
      }} />
    );

    // صفحه ورود
    function LoginScreen({ onLogin, onRegister }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [role, setRole] = useState('teacher');

      const submit = () => {
        setError('');
        if (!username || !password) { setError('نام کاربری و رمز عبور را وارد کنید'); return; }
        const user = db.get(`user:${role}:${username}`);
        if (!user || user.password !== password) { setError('نام کاربری یا رمز عبور اشتباه است'); return; }
        onLogin(user);
      };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg,#667eea 0%,#764ba2 100%)', padding: 20 }}>
          <div style={{ background: '#fff', borderRadius: 16, padding: 40, width: '100%', maxWidth: 400 }}>
            <h1 style={{ textAlign: 'center', marginBottom: 30, fontSize: 24 }}>سامانه آزمون مدرسه</h1>
            
            <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
              <button onClick={() => setRole('admin')} style={{
                flex: 1, padding: '10px', borderRadius: 8, border: 'none', fontSize: 13, fontWeight: 700,
                background: role === 'admin' ? '#2563EB' : '#F1F5F9', color: role === 'admin' ? '#fff' : '#475569'
              }}>مدیر</button>
              <button onClick={() => setRole('teacher')} style={{
                flex: 1, padding: '10px', borderRadius: 8, border: 'none', fontSize: 13, fontWeight: 700,
                background: role === 'teacher' ? '#2563EB' : '#F1F5F9', color: role === 'teacher' ? '#fff' : '#475569'
              }}>معلم</button>
            </div>

            <div style={{ marginBottom: 16 }}>
              <label style={{ display: 'block', marginBottom: 8, fontSize: 14, color: '#475569' }}>نام کاربری</label>
              <Input value={username} onChange={(e) => setUsername(e.target.value)} placeholder="نام کاربری" />
            </div>

            <div style={{ marginBottom: 20 }}>
              <label style={{ display: 'block', marginBottom: 8, fontSize: 14, color: '#475569' }}>رمز عبور</label>
              <Input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="رمز عبور" />
            </div>

            {error && <div style={{ color: '#DC2626', fontSize: 13, marginBottom: 16, textAlign: 'center' }}>{error}</div>}

            <Button onClick={submit} style={{ width: '100%', padding: '14px', fontSize: 15 }}>ورود</Button>

            <div style={{ textAlign: 'center', marginTop: 20, fontSize: 13, color: '#64748B' }}>
              حساب ندارید؟ <span onClick={onRegister} style={{ color: '#2563EB', cursor: 'pointer', fontWeight: 700 }}>ثبت‌نام</span>
            </div>
          </div>
        </div>
      );
    }

    // صفحه ثبت‌نام
    function RegisterScreen({ onRegistered, onBack }) {
      const [fullname, setFullname] = useState('');
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [role, setRole] = useState('teacher');
      const [error, setError] = useState('');

      const submit = () => {
        setError('');
        if (!fullname || !username || !password) { setError('همه فیلدها را پر کنید'); return; }
        const existing = db.get(`user:${role}:${username}`);
        if (existing) { setError('این نام کاربری قبلاً ثبت شده است'); return; }
        const user = { id: uid(), role, username, password, fullname, created: new Date().toISOString() };
        db.set(`user:${role}:${username}`, user);
        onRegistered(user);
      };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg,#667eea 0%,#764ba2 100%)', padding: 20 }}>
          <div style={{ background: '#fff', borderRadius: 16, padding: 40, width: '100%', maxWidth: 400 }}>
            <h1 style={{ textAlign: 'center', marginBottom: 30, fontSize: 24 }}>ثبت‌نام</h1>
            
            <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
              <button onClick={() => setRole('admin')} style={{
                flex: 1, padding: '10px', borderRadius: 8, border: 'none', fontSize: 13, fontWeight: 700,
                background: role === 'admin' ? '#2563EB' : '#F1F5F9', color: role === 'admin' ? '#fff' : '#475569'
              }}>مدیر مدرسه</button>
              <button onClick={() => setRole('teacher')} style={{
                flex: 1, padding: '10px', borderRadius: 8, border: 'none', fontSize: 13, fontWeight: 700,
                background: role === 'teacher' ? '#2563EB' : '#F1F5F9', color: role === 'teacher' ? '#fff' : '#475569'
              }}>معلم</button>
            </div>

            <div style={{ marginBottom: 16 }}>
              <label style={{ display: 'block', marginBottom: 8, fontSize: 14, color: '#475569' }}>نام و نام‌خانوادگی</label>
              <Input value={fullname} onChange={(e) => setFullname(e.target.value)} placeholder="مثلاً: زهرا احمدی" />
            </div>

            <div style={{ marginBottom: 16 }}>
              <label style={{ display: 'block', marginBottom: 8, fontSize: 14, color: '#475569' }}>نام کاربری</label>
              <Input value={username} onChange={(e) => setUsername(e.target.value)} placeholder="نام کاربری" />
            </div>

            <div style={{ marginBottom: 20 }}>
              <label style={{ display: 'block', marginBottom: 8, fontSize: 14, color: '#475569' }}>رمز عبور</label>
              <Input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="رمز عبور" />
            </div>

            {error && <div style={{ color: '#DC2626', fontSize: 13, marginBottom: 16, textAlign: 'center' }}>{error}</div>}

            <Button onClick={submit} style={{ width: '100%', padding: '14px', fontSize: 15 }}>ثبت‌نام</Button>

            <div style={{ textAlign: 'center', marginTop: 20, fontSize: 13, color: '#64748B' }}>
              قبلاً ثبت‌نام کردید؟ <span onClick={onBack} style={{ color: '#2563EB', cursor: 'pointer', fontWeight: 700 }}>ورود</span>
            </div>
          </div>
        </div>
      );
    }

    // داشبورد مدیر
    function AdminDashboard({ user, onLogout }) {
      const [view, setView] = useState('dashboard');
      const teachers = db.getAll('user:teacher:');
      const exams = db.getAll('exam:');
      const students = db.getAll('roster:');

      return (
        <div style={{ display: 'flex', minHeight: '100vh' }}>
          <div style={{ width: 220, background: '#0F172A', padding: 20, color: '#fff' }}>
            <h2 style={{ marginBottom: 30, fontSize: 18 }}>پنل مدیر</h2>
            <div onClick={() => setView('dashboard')} style={{ padding: 12, borderRadius: 8, cursor: 'pointer', marginBottom: 8, background: view === 'dashboard' ? '#2563EB' : 'transparent' }}>داشبورد</div>
            <div onClick={() => setView('teachers')} style={{ padding: 12, borderRadius: 8, cursor: 'pointer', marginBottom: 8, background: view === 'teachers' ? '#2563EB' : 'transparent' }}>معلمان</div>
            <div onClick={() => setView('exams')} style={{ padding: 12, borderRadius: 8, cursor: 'pointer', marginBottom: 8, background: view === 'exams' ? '#2563EB' : 'transparent' }}>آزمون‌ها</div>
            <div onClick={onLogout} style={{ padding: 12, borderRadius: 8, cursor: 'pointer', color: '#F87171', marginTop: 20 }}>خروج</div>
          </div>

          <div style={{ flex: 1, padding: 30 }}>
            <h1 style={{ marginBottom: 30, fontSize: 24 }}>داشبورد مدیر</h1>
            
            {view === 'dashboard' && (
              <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap' }}>
                <div style={{ background: '#fff', padding: 24, borderRadius: 12, border: '1px solid #E2E8F0', minWidth: 200 }}>
                  <div style={{ fontSize: 14, color: '#64748B', marginBottom: 8 }}>معلمان</div>
                  <div style={{ fontSize: 32, fontWeight: 800 }}>{teachers.length}</div>
                </div>
                <div style={{ background: '#fff', padding: 24, borderRadius: 12, border: '1px solid #E2E8F0', minWidth: 200 }}>
                  <div style={{ fontSize: 14, color: '#64748B', marginBottom: 8 }}>آزمون‌ها</div>
                  <div style={{ fontSize: 32, fontWeight: 800 }}>{exams.length}</div>
                </div>
                <div style={{ background: '#fff', padding: 24, borderRadius: 12, border: '1px solid #E2E8F0', minWidth: 200 }}>
                  <div style={{ fontSize: 14, color: '#64748B', marginBottom: 8 }}>دانش‌آموزان</div>
                  <div style={{ fontSize: 32, fontWeight: 800 }}>{students.length}</div>
                </div>
              </div>
            )}

            {view === 'teachers' && (
              <div style={{ background: '#fff', padding: 24, borderRadius: 12, border: '1px solid #E2E8F0' }}>
                <h2 style={{ marginBottom: 20 }}>معلمان ثبت‌نام شده</h2>
                {teachers.length === 0 ? (
                  <p style={{ color: '#64748B', textAlign: 'center', padding: 40 }}>هنوز معلمی ثبت‌نام نکرده است</p>
                ) : (
                  <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                    <thead>
                      <tr style={{ borderBottom: '2px solid #E2E8F0' }}>
                        <th style={{ padding: 12, textAlign: 'right' }}>نام</th>
                        <th style={{ padding: 12, textAlign: 'right' }}>نام کاربری</th>
                        <th style={{ padding: 12, textAlign: 'right' }}>تاریخ ثبت‌نام</th>
                      </tr>
                    </thead>
                    <tbody>
                      {teachers.map(t => (
                        <tr key={t.id} style={{ borderBottom: '1px solid #F1F5F9' }}>
                          <td style={{ padding: 12 }}>{t.fullname}</td>
                          <td style={{ padding: 12 }}>{t.username}</td>
                          <td style={{ padding: 12 }}>{new Date(t.created).toLocaleDateString('fa-IR')}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            )}

            {view === 'exams' && (
              <div style={{ background: '#fff', padding: 24, borderRadius: 12, border: '1px solid #E2E8F0' }}>
                <h2 style={{ marginBottom: 20 }}>همه آزمون‌ها</h2>
                {exams.length === 0 ? (
                  <p style={{ color: '#64748B', textAlign: 'center', padding: 40 }}>هنوز آزمونی ساخته نشده است</p>
                ) : (
                  <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                    <thead>
                      <tr style={{ borderBottom: '2px solid #E2E8F0' }}>
                        <th style={{ padding: 12, textAlign: 'right' }}>عنوان</th>
                        <th style={{ padding: 12, textAlign: 'right' }}>معلم</th>
                        <th style={{ padding: 12, textAlign: 'right' }}>تاریخ</th>
                      </tr>
                    </thead>
                    <tbody>
                      {exams.map(e => {
                        const teacher = teachers.find(t => t.username === e.teacher_id);
                        return (
                          <tr key={e.id} style={{ borderBottom: '1px solid #F1F5F9' }}>
                            <td style={{ padding: 12 }}>{e.title}</td>
                            <td style={{ padding: 12 }}>{teacher?.fullname || '—'}</td>
                            <td style={{ padding: 12 }}>{new Date(e.created).toLocaleDateString('fa-IR')}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // داشبورد معلم
    function TeacherDashboard({ user, onLogout }) {
      const [view, setView] = useState('dashboard');
      const [activeExamId, setActiveExamId] = useState(null);
      const [activeClassId, setActiveClassId] = useState(null);
      const [, forceUpdate] = useState(0);

      const myExams = db.getAll('exam:').filter(e => e.teacher_id === user.username);
      const myClasses = db.getAll('class:').filter(c => c.teacher_id === user.username);
      const myRoster = db.getAll('roster:').filter(r => r.teacher_id === user.username);

      const refresh = () => forceUpdate(n => n + 1);

      if (activeExamId) {
        return <ExamManager examId={activeExamId} user={user} onBack={() => { setActiveExamId(null); refresh(); }} />;
      }

      if (activeClassId) {
        return <ClassManager classId={activeClassId} user={user} onBack={() => { setActiveClassId(null); refresh(); }} />;
      }

      return (
        <div style={{ display: 'flex', minHeight: '100vh' }}>
          <div style={{ width: 220, background: '#132A52', padding: 20, color: '#fff' }}>
            <h2 style={{ marginBottom: 30, fontSize: 18 }}>پنل معلم</h2>
            <div onClick={() => setView('dashboard')} style={{ padding: 12, borderRadius: 8, cursor: 'pointer', marginBottom: 8, background: view === 'dashboard' ? '#2563EB' : 'transparent' }}>داشبورد</div>
            <div onClick={() => setView('exams')} style={{ padding: 12, borderRadius: 8, cursor: 'pointer', marginBottom: 8, background: view === 'exams' ? '#2563EB' : 'transparent' }}>آزمون‌ها</div>
            <div onClick={() => setView('classes')} style={{ padding: 12, borderRadius: 8, cursor: 'pointer', marginBottom: 8, background: view === 'classes' ? '#2563EB' : 'transparent' }}>کلاس‌ها</div>
            <div onClick={onLogout} style={{ padding: 12, borderRadius: 8, cursor: 'pointer', color: '#F87171', marginTop: 20 }}>خروج</div>
          </div>

          <div style={{ flex: 1, padding: 30 }}>
            <h1 style={{ marginBottom: 30, fontSize: 24 }}>داشبورد معلم</h1>
            
            {view === 'dashboard' && (
              <div>
                <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap', marginBottom: 30 }}>
                  <div style={{ background: '#fff', padding: 24, borderRadius: 12, border: '1px solid #E2E8F0', minWidth: 200 }}>
                    <div style={{ fontSize: 14, color: '#64748B', marginBottom: 8 }}>آزمون‌ها</div>
                    <div style={{ fontSize: 32, fontWeight: 800 }}>{myExams.length}</div>
                  </div>
                  <div style={{ background: '#fff', padding: 24, borderRadius: 12, border: '1px solid #E2E8F0', minWidth: 200 }}>
                    <div style={{ fontSize: 14, color: '#64748B', marginBottom: 8 }}>کلاس‌ها</div>
                    <div style={{ fontSize: 32, fontWeight: 800 }}>{myClasses.length}</div>
                  </div>
                  <div style={{ background: '#fff', padding: 24, borderRadius: 12, border: '1px solid #E2E8F0', minWidth: 200 }}>
                    <div style={{ fontSize: 14, color: '#64748B', marginBottom: 8 }}>دانش‌آموزان</div>
                    <div style={{ fontSize: 32, fontWeight: 800 }}>{myRoster.length}</div>
                  </div>
                </div>
              </div>
            )}

            {view === 'exams' && (
              <div>
                <Button onClick={() => {
                  const title = prompt('عنوان آزمون:');
                  if (!title) return;
                  const id = uid();
                  db.set(`exam:${id}`, { id, title, teacher_id: user.username, created: new Date().toISOString() });
                  refresh();
                }} style={{ marginBottom: 20 }}>+ ساخت آزمون جدید</Button>

                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 16 }}>
                  {myExams.map(ex => (
                    <div key={ex.id} style={{ background: '#fff', padding: 20, borderRadius: 12, border: '1px solid #E2E8F0' }}>
                      <h3 style={{ marginBottom: 8 }}>{ex.title}</h3>
                      <p style={{ fontSize: 12, color: '#64748B', marginBottom: 16 }}>{new Date(ex.created).toLocaleDateString('fa-IR')}</p>
                      <div style={{ display: 'flex', gap: 8 }}>
                        <Button variant="ghost" onClick={() => setActiveExamId(ex.id)} style={{ fontSize: 13 }}>مدیریت سوالات</Button>
                        <Button variant="danger" onClick={() => {
                          if (confirm('آزمون حذف شود؟')) {
                            db.delete(`exam:${ex.id}`);
                            db.getAll('question:').filter(q => q.exam_id === ex.id).forEach(q => db.delete(`question:${q.id}`));
                            refresh();
                          }
                        }} style={{ fontSize: 13 }}>حذف</Button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {view === 'classes' && (
              <div>
                <Button onClick={() => {
                  const name = prompt('نام کلاس:');
                  if (!name) return;
                  const id = uid();
                  db.set(`class:${id}`, { id, name: name.trim(), teacher_id: user.username, created: new Date().toISOString() });
                  refresh();
                }} style={{ marginBottom: 20 }}>+ افزودن کلاس</Button>

                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 16 }}>
                  {myClasses.map(c => {
                    const count = myRoster.filter(r => r.class_id === c.id).length;
                    return (
                      <div key={c.id} style={{ background: '#fff', padding: 20, borderRadius: 12, border: '1px solid #E2E8F0' }}>
                        <h3 style={{ marginBottom: 8 }}>{c.name}</h3>
                        <p style={{ fontSize: 12, color: '#64748B', marginBottom: 16 }}>{count} دانش‌آموز</p>
                        <div style={{ display: 'flex', gap: 8 }}>
                          <Button variant="ghost" onClick={() => setActiveClassId(c.id)} style={{ fontSize: 13 }}>مدیریت دانش‌آموزان</Button>
                          <Button variant="danger" onClick={() => {
                            if (confirm('کلاس و دانش‌آموزان آن حذف شوند؟')) {
                              db.delete(`class:${c.id}`);
                              myRoster.filter(r => r.class_id === c.id).forEach(r => db.delete(`roster:${r.id}`));
                              refresh();
                            }
                          }} style={{ fontSize: 13 }}>حذف</Button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // مدیریت سوالات آزمون
    function ExamManager({ examId, user, onBack }) {
      const exam = db.get(`exam:${examId}`);
      const [questions, setQuestions] = useState(db.getAll('question:').filter(q => q.exam_id === examId));
      const [qType, setQType] = useState('mc');
      const [qText, setQText] = useState('');
      const [options, setOptions] = useState(['', '', '', '']);
      const [correct, setCorrect] = useState(0);
      const [mark, setMark] = useState(1);
      const [, forceUpdate] = useState(0);

      const saveQuestion = () => {
        if (!qText.trim()) { alert('متن سوال را وارد کنید'); return; }
        if (qType === 'mc' && options.some(o => !o.trim())) { alert('همه گزینه‌ها را پر کنید'); return; }
        const id = uid();
        const question = { id, exam_id: examId, type: qType, question_text: qText.trim(), mark: Number(mark) || 1 };
        if (qType === 'mc') {
          question.option_a = options[0];
          question.option_b = options[1];
          question.option_c = options[2];
          question.option_d = options[3];
          question.correct_answer = ['A', 'B', 'C', 'D'][correct];
        }
        db.set(`question:${id}`, question);
        setQuestions([...questions, question]);
        setQText('');
        setOptions(['', '', '', '']);
        setCorrect(0);
        forceUpdate(n => n + 1);
      };

      const removeQuestion = (id) => {
        if (!confirm('سوال حذف شود؟')) return;
        db.delete(`question:${id}`);
        setQuestions(questions.filter(q => q.id !== id));
      };

      return (
        <div style={{ padding: 30 }}>
          <Button variant="ghost" onClick={onBack} style={{ marginBottom: 20 }}>← بازگشت</Button>
          <h1 style={{ marginBottom: 30, fontSize: 24 }}>سوالات آزمون: {exam.title}</h1>

          <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap' }}>
            <div style={{ flex: '1 1 400px', background: '#fff', padding: 24, borderRadius: 12, border: '1px solid #E2E8F0' }}>
              <h2 style={{ marginBottom: 20, fontSize: 18 }}>افزودن سوال</h2>
              
              <div style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', marginBottom: 8, fontSize: 14 }}>نوع سوال</label>
                <select value={qType} onChange={(e) => setQType(e.target.value)} style={{ width: '100%', padding: '12px', border: '1.5px solid #E2E8F0', borderRadius: 8 }}>
                  <option value="mc">چهارگزینه‌ای</option>
                </select>
              </div>

              <div style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', marginBottom: 8, fontSize: 14 }}>متن سوال</label>
                <textarea value={qText} onChange={(e) => setQText(e.target.value)} rows={3} style={{ width: '100%', padding: '12px', border: '1.5px solid #E2E8F0', borderRadius: 8, resize: 'vertical' }} />
              </div>

              <div style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', marginBottom: 8, fontSize: 14 }}>گزینه‌ها (روی دایره سبز کلیک کنید)</label>
                {options.map((opt, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                    <div onClick={() => setCorrect(i)} style={{ width: 24, height: 24, borderRadius: '50%', border: '2px solid', borderColor: correct === i ? '#16A34A' : '#CBD5E1', background: correct === i ? '#16A34A' : '#fff', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 14 }}>
                      {correct === i ? '✓' : ''}
                    </div>
                    <span style={{ fontWeight: 700, width: 20 }}>{['A', 'B', 'C', 'D'][i]}</span>
                    <input value={opt} onChange={(e) => { const arr = [...options]; arr[i] = e.target.value; setOptions(arr); }} placeholder={`گزینه ${['A', 'B', 'C', 'D'][i]}`} style={{ flex: 1, padding: '10px', border: '1.5px solid #E2E8F0', borderRadius: 8 }} />
                  </div>
                ))}
              </div>

              <div style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', marginBottom: 8, fontSize: 14 }}>نمره</label>
                <input type="number" value={mark} onChange={(e) => setMark(e.target.value)} min="1" style={{ width: 100, padding: '10px', border: '1.5px solid #E2E8F0', borderRadius: 8 }} />
              </div>

              <Button onClick={saveQuestion} style={{ width: '100%' }}>+ افزودن سوال</Button>
            </div>

            <div style={{ flex: '1 1 400px' }}>
              <h2 style={{ marginBottom: 20, fontSize: 18 }}>سوالات ({questions.length})</h2>
              {questions.length === 0 ? (
                <div style={{ background: '#fff', padding: 40, borderRadius: 12, border: '1px solid #E2E8F0', textAlign: 'center', color: '#64748B' }}>هنوز سوالی اضافه نشده است</div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {questions.map((q, idx) => (
                    <div key={q.id} style={{ background: '#fff', padding: 16, borderRadius: 12, border: '1px solid #E2E8F0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <div>
                        <div style={{ fontWeight: 700, marginBottom: 4 }}>{idx + 1}. {q.question_text}</div>
                        <div style={{ fontSize: 12, color: '#64748B' }}>پاسخ: {q.correct_answer} · نمره: {q.mark}</div>
                      </div>
                      <Button variant="danger" onClick={() => removeQuestion(q.id)} style={{ fontSize: 12 }}>حذف</Button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // مدیریت کلاس و دانش‌آموزان
    function ClassManager({ classId, user, onBack }) {
      const cls = db.get(`class:${classId}`);
      const [roster, setRoster] = useState(db.getAll('roster:').filter(r => r.class_id === classId));
      const [name, setName] = useState('');
      const [, forceUpdate] = useState(0);

      const addStudent = () => {
        if (!name.trim()) { alert('نام دانش‌آموز را وارد کنید'); return; }
        const allCodes = roster.map(r => r.code);
        const id = uid();
        const code = generateCode(allCodes);
        const student = { id, class_id: classId, teacher_id: user.username, fullname: name.trim(), code, created: new Date().toISOString() };
        db.set(`roster:${id}`, student);
        setRoster([...roster, student]);
        setName('');
        forceUpdate(n => n + 1);
      };

      const removeStudent = (id) => {
        if (!confirm('دانش‌آموز حذف شود؟')) return;
        db.delete(`roster:${id}`);
        setRoster(roster.filter(r => r.id !== id));
      };

      return (
        <div style={{ padding: 30 }}>
          <Button variant="ghost" onClick={onBack} style={{ marginBottom: 20 }}>← بازگشت</Button>
          <h1 style={{ marginBottom: 30, fontSize: 24 }}>دانش‌آموزان کلاس: {cls.name}</h1>

          <div style={{ background: '#fff', padding: 24, borderRadius: 12, border: '1px solid #E2E8F0', marginBottom: 20 }}>
            <h2 style={{ marginBottom: 16, fontSize: 18 }}>افزودن دانش‌آموز</h2>
            <div style={{ display: 'flex', gap: 12 }}>
              <input value={name} onChange={(e) => setName(e.target.value)} placeholder="نام دانش‌آموز" onKeyDown={(e) => e.key === 'Enter' && addStudent()} style={{ flex: 1, padding: '12px', border: '1.5px solid #E2E8F0', borderRadius: 8 }} />
              <Button onClick={addStudent}>+ افزودن</Button>
            </div>
          </div>

          <div style={{ background: '#fff', padding: 24, borderRadius: 12, border: '1px solid #E2E8F0' }}>
            <h2 style={{ marginBottom: 16, fontSize: 18 }}>لیست دانش‌آموزان ({roster.length})</h2>
            {roster.length === 0 ? (
              <p style={{ color: '#64748B', textAlign: 'center', padding: 40 }}>هنوز دانش‌آموزی اضافه نشده است</p>
            ) : (
              <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                <thead>
                  <tr style={{ borderBottom: '2px solid #E2E8F0' }}>
                    <th style={{ padding: 12, textAlign: 'right' }}>نام</th>
                    <th style={{ padding: 12, textAlign: 'right' }}>کد ورود</th>
                    <th style={{ padding: 12, textAlign: 'right' }}></th>
                  </tr>
                </thead>
                <tbody>
                  {roster.map(m => (
                    <tr key={m.id} style={{ borderBottom: '1px solid #F1F5F9' }}>
                      <td style={{ padding: 12, fontWeight: 700 }}>{m.fullname}</td>
                      <td style={{ padding: 12 }}>
                        <span style={{ fontFamily: 'monospace', fontSize: 18, fontWeight: 800, color: '#2563EB', letterSpacing: 2 }}>{m.code}</span>
                      </td>
                      <td style={{ padding: 12 }}>
                        <Button variant="danger" onClick={() => removeStudent(m.id)} style={{ fontSize: 12 }}>حذف</Button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      );
    }

    // اپلیکیشن اصلی
    function App() {
      const [user, setUser] = useState(() => db.get('currentUser'));
      const [authView, setAuthView] = useState('login');

      const handleLogin = (u) => {
        db.set('currentUser', u);
        setUser(u);
      };

      const handleLogout = () => {
        db.delete('currentUser');
        setUser(null);
        setAuthView('login');
      };

      if (!user) {
        if (authView === 'register') {
          return <RegisterScreen onRegistered={handleLogin} onBack={() => setAuthView('login')} />;
        }
        return <LoginScreen onLogin={handleLogin} onRegister={() => setAuthView('register')} />;
      }

      if (user.role === 'admin') {
        return <AdminDashboard user={user} onLogout={handleLogout} />;
      }

      return <TeacherDashboard user={user} onLogout={handleLogout} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

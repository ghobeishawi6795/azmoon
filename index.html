<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سامانه مدیریت مدرسه</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #F0F4F8;
            min-height: 100vh;
            padding: 20px;
        }
        #root {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #E8EDF2;
        }
        .header h1 {
            font-size: 22px;
            color: #1A2A3A;
        }
        .header .user {
            font-size: 14px;
            color: #6B7A8A;
        }
        .header .user span {
            color: #2563EB;
            font-weight: 700;
        }
        .logo {
            font-size: 28px;
            margin-bottom: 10px;
        }
        h2 {
            font-size: 18px;
            color: #1A2A3A;
            margin-bottom: 12px;
        }
        .flex {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #3A4A5A;
            margin-bottom: 4px;
        }
        input,
        select,
        textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1.5px solid #DCE3EA;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            background: white;
            transition: border-color 0.2s;
            margin-bottom: 12px;
        }
        input:focus,
        select:focus,
        textarea:focus {
            border-color: #2563EB;
        }
        textarea {
            min-height: 60px;
            resize: vertical;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            background: #2563EB;
            color: white;
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }
        .btn-ghost {
            background: #F0F4F8;
            color: #3A4A5A;
        }
        .btn-danger {
            background: #FEE2E2;
            color: #DC2626;
        }
        .btn-success {
            background: #16A34A;
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #2563EB;
            color: #2563EB;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge-blue {
            background: #DBEAFE;
            color: #2563EB;
        }
        .badge-green {
            background: #D1FAE5;
            color: #16A34A;
        }
        .badge-orange {
            background: #FEF3C7;
            color: #D97706;
        }
        .badge-red {
            background: #FEE2E2;
            color: #DC2626;
        }
        .badge-gray {
            background: #F3F4F6;
            color: #6B7280;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #F0F4F8;
            flex-wrap: wrap;
            gap: 8px;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-item .title {
            font-weight: 600;
            color: #1A2A3A;
        }
        .list-item .sub {
            font-size: 12px;
            color: #6B7A8A;
        }
        .mt-10 {
            margin-top: 10px;
        }
        .mb-10 {
            margin-bottom: 10px;
        }
        .text-center {
            text-align: center;
        }
        .text-muted {
            color: #6B7A8A;
            font-size: 13px;
        }
        .empty {
            text-align: center;
            padding: 30px 0;
            color: #9AA8B8;
            font-size: 14px;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }
        .modal {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-header h2 {
            margin: 0;
        }
        .modal-close {
            cursor: pointer;
            font-size: 22px;
            color: #9AA8B8;
            background: none;
            border: none;
            padding: 0 8px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #F8FAFC;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-box .num {
            font-size: 24px;
            font-weight: 900;
            color: #1A2A3A;
        }
        .stat-box .label {
            font-size: 11px;
            color: #6B7A8A;
        }
        .hidden {
            display: none !important;
        }
        .w-full {
            width: 100%;
        }
        .gap-8 {
            gap: 8px;
        }
        .mt-16 {
            margin-top: 16px;
        }
        .border-top {
            border-top: 1px solid #E8EDF2;
            padding-top: 16px;
        }
        .code-display {
            font-family: monospace;
            font-size: 20px;
            font-weight: 900;
            color: #2563EB;
            letter-spacing: 3px;
            background: #F0F4F8;
            padding: 4px 12px;
            border-radius: 8px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        'use strict';

        // ============================================================
        //  React مینیاتوری (آفلاین)
        // ============================================================

        const React = {
            createElement: function(type, props, ...children) {
                if (typeof type === 'function') {
                    return type(props || {});
                }
                const el = document.createElement(type);
                if (props) {
                    for (const key in props) {
                        if (key === 'className') { el.className = props[key]; } else if (key === 'style' && typeof props[
                                key] === 'object') {
                            Object.assign(el.style, props[key]);
                        } else if (key.startsWith('on') && typeof props[key] === 'function') {
                            el.addEventListener(key.substring(2).toLowerCase(), props[key]);
                        } else if (key === 'dangerouslySetInnerHTML') {
                            el.innerHTML = props[key].__html;
                        } else if (['value', 'type', 'placeholder', 'disabled', 'rows', 'min', 'max', 'step'].includes(
                            key)) {
                            el[key] = props[key];
                        } else {
                            el.setAttribute(key, props[key]);
                        }
                    }
                }
                for (const child of children) {
                    if (child === null || child === undefined || child === false) continue;
                    if (typeof child === 'string' || typeof child === 'number') {
                        el.appendChild(document.createTextNode(String(child)));
                    } else if (child instanceof Node) {
                        el.appendChild(child);
                    } else if (Array.isArray(child)) {
                        for (const sc of child) {
                            if (sc instanceof Node) el.appendChild(sc);
                        }
                    }
                }
                return el;
            },
            useState: function(init) {
                const state = {
                    value: typeof init === 'function' ? init() : init,
                    listeners: []
                };
                const set = function(newVal) {
                    const next = typeof newVal === 'function' ? newVal(state.value) : newVal;
                    if (next !== state.value) {
                        state.value = next;
                        state.listeners.forEach(l => l());
                    }
                };
                const get = function() { return state.value; };
                const result = [get, set];
                result._addListener = function(l) { state.listeners.push(l); };
                return result;
            },
            useEffect: function(effect, deps) { effect(); },
            useCallback: function(fn, deps) { return fn; },
            useRef: function(init) { return { current: init }; }
        };

        const ReactDOM = {
            createRoot: function(container) {
                return {
                    render: function(el) {
                        container.innerHTML = '';
                        if (el instanceof Node) container.appendChild(el);
                    }
                };
            }
        };

        // ============================================================
        //  ابزارهای کمکی
        // ============================================================

        const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

        function getJSON(key) {
            try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : null; } catch { return null; }
        }

        function setJSON(key, val) {
            try { localStorage.setItem(key, JSON.stringify(val)); return true; } catch { return false; }
        }

        function deleteKey(key) {
            try { localStorage.removeItem(key); return true; } catch { return false; }
        }

        function listPrefix(prefix) {
            try { return Object.keys(localStorage).filter(k => k.startsWith(prefix)); } catch { return []; }
        }

        function loadAll(prefix) {
            return listPrefix(prefix).map(k => getJSON(k)).filter(Boolean);
        }

        function generateCode(existing) {
            let code;
            do { code = String(Math.floor(100000 + Math.random() * 900000)); } while (existing.includes(code));
            return code;
        }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function awardedMarkOf(a) {
            if (a.awarded_mark != null) return a.awarded_mark;
            return a.is_correct ? a.mark : 0;
        }

        // ============================================================
        //  کامپوننت‌های UI
        // ============================================================

        function Field({ label, children }) {
            return React.createElement('div', { className: 'field' },
                React.createElement('label', null, label),
                children
            );
        }

        function Button({ children, variant = 'primary', style, onClick, disabled, className = '' }) {
            const variants = {
                primary: { background: '#2563EB', color: '#fff' },
                ghost: { background: '#F0F4F8', color: '#3A4A5A' },
                danger: { background: '#FEE2E2', color: '#DC2626' },
                success: { background: '#16A34A', color: '#fff' },
                outline: { background: 'transparent', color: '#2563EB', border: '1.5px solid #2563EB' },
            };
            const base = {
                padding: '10px 18px',
                borderRadius: 10,
                fontSize: 14,
                fontWeight: 700,
                cursor: 'pointer',
                fontFamily: 'inherit',
                border: 'none',
                transition: 'all 0.1s',
                ...variants[variant],
                ...style
            };
            return React.createElement('button', { style: base, onClick, disabled, className }, children);
        }

        function TextInput({ value, onChange, placeholder, type = 'text', style = {}, ...props }) {
            return React.createElement('input', {
                type,
                value,
                onChange: e => onChange(e.target.value),
                placeholder,
                style: { width: '100%', padding: '10px 14px', borderRadius: 10, border: '1.5px solid #DCE3EA',
                    fontSize: 14, outline: 'none', fontFamily: 'inherit', background: '#fff',
                    color: '#1A2A3A', ...style },
                ...props
            });
        }

        function Badge({ children, tone = 'blue' }) {
            const tones = {
                blue: 'badge-blue',
                green: 'badge-green',
                orange: 'badge-orange',
                red: 'badge-red',
                gray: 'badge-gray'
            };
            return React.createElement('span', { className: 'badge ' + (tones[tone] || 'badge-gray') }, children);
        }

        function Modal({ title, children, onClose }) {
            return React.createElement('div', { className: 'modal-overlay' },
                React.createElement('div', { className: 'modal' },
                    React.createElement('div', { className: 'modal-header' },
                        React.createElement('h2', null, title),
                        React.createElement('button', { className: 'modal-close', onClick: onClose }, '✕')
                    ),
                    children
                )
            );
        }

        function EmptyState({ text }) {
            return React.createElement('div', { className: 'empty' }, text);
        }

        // ============================================================
        //  صفحه ورود
        // ============================================================

        function LoginScreen({ onLogin, onRegister }) {
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [showPw, setShowPw] = React.useState(false);

            const submit = () => {
                setError('');
                if (!username || !password) { setError('نام کاربری و رمز عبور را وارد کنید.'); return; }
                setLoading(true);
                const teacher = getJSON(`teacher:${username}`);
                setTimeout(() => {
                    setLoading(false);
                    if (!teacher || teacher.password !== password) {
                        setError('نام کاربری یا رمز عبور اشتباه است.');
                        return;
                    }
                    onLogin(teacher);
                }, 300);
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'logo' }, '🏫'),
                React.createElement('h1', { style: { fontSize: 22, color: '#1A2A3A', marginBottom: 4 } },
                    'سامانه مدیریت مدرسه'),
                React.createElement('div', { className: 'text-muted', style: { marginBottom: 20 } },
                    'ورود به پنل مدیریت'),

                React.createElement(Field, { label: 'نام کاربری' },
                    React.createElement(TextInput, { value: username, onChange: setUsername,
                        placeholder: 'نام کاربری', onKeyDown: e => e.key === 'Enter' && submit() })
                ),
                React.createElement(Field, { label: 'رمز عبور' },
                    React.createElement('div', { style: { position: 'relative' } },
                        React.createElement(TextInput, {
                            type: showPw ? 'text' : 'password',
                            value: password,
                            onChange: setPassword,
                            placeholder: 'رمز عبور',
                            onKeyDown: e => e.key === 'Enter' && submit()
                        }),
                        React.createElement('span', {
                            style: { position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)',
                                cursor: 'pointer', fontSize: 18 },
                            onClick: () => setShowPw(!showPw)
                        }, showPw ? '🙈' : '👁️')
                    )
                ),

                error && React.createElement('div', { style: { color: '#DC2626', fontSize: 13, margin: '8px 0' } },
                    error),

                React.createElement(Button, { onClick: submit, disabled: loading, style: { width: '100%' } },
                    loading ? 'در حال ورود...' : 'ورود'
                ),

                React.createElement('div', { style: { textAlign: 'center', marginTop: 14, fontSize: 13,
                        color: '#6B7A8A' } },
                    'حساب نداری؟ ',
                    React.createElement('span', {
                        style: { color: '#2563EB', fontWeight: 700, cursor: 'pointer' },
                        onClick: onRegister
                    }, 'ثبت‌نام مدیر')
                )
            );
        }

        // ============================================================
        //  صفحه ثبت‌نام مدیر
        // ============================================================

        function RegisterScreen({ onRegistered, goLogin }) {
            const [fullname, setFullname] = React.useState('');
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [email, setEmail] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const submit = () => {
                setError('');
                if (!fullname || !username || !password || !email) {
                    setError('همه فیلدها را پر کنید.');
                    return;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    setError('ایمیل معتبر نیست.');
                    return;
                }
                if (password.length < 4) {
                    setError('رمز عبور باید حداقل ۴ کاراکتر باشد.');
                    return;
                }
                setLoading(true);
                if (getJSON(`teacher:${username}`)) {
                    setLoading(false);
                    setError('این نام کاربری قبلاً ثبت شده است.');
                    return;
                }
                const teacher = {
                    username,
                    password,
                    fullname,
                    email,
                    role: 'admin',
                    created_at: new Date().toISOString()
                };
                setJSON(`teacher:${username}`, teacher);
                setLoading(false);
                onRegistered(teacher);
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'logo' }, '📝'),
                React.createElement('h1', { style: { fontSize: 20, color: '#1A2A3A' } }, 'ثبت‌نام مدیر'),
                React.createElement('div', { className: 'text-muted', style: { marginBottom: 16 } },
                    'فقط یک‌بار برای راه‌اندازی سامانه'),

                React.createElement(Field, { label: 'نام و نام‌خانوادگی' },
                    React.createElement(TextInput, { value: fullname, onChange: setFullname,
                        placeholder: 'مثلاً: علی محمدی' })
                ),
                React.createElement(Field, { label: 'نام کاربری' },
                    React.createElement(TextInput, { value: username, onChange: setUsername,
                        placeholder: 'یک نام کاربری یکتا' })
                ),
                React.createElement(Field, { label: 'رمز عبور' },
                    React.createElement(TextInput, { type: 'password', value: password, onChange: setPassword,
                        placeholder: 'حداقل ۴ کاراکتر' })
                ),
                React.createElement(Field, { label: 'ایمیل' },
                    React.createElement(TextInput, { type: 'email', value: email, onChange: setEmail,
                        placeholder: 'برای بازیابی رمز عبور' })
                ),

                error && React.createElement('div', { style: { color: '#DC2626', fontSize: 13, margin: '8px 0' } },
                    error),

                React.createElement(Button, { onClick: submit, disabled: loading, style: { width: '100%' } },
                    loading ? 'در حال ثبت...' : 'ثبت‌نام'
                ),

                React.createElement('div', { style: { textAlign: 'center', marginTop: 14, fontSize: 13,
                        color: '#6B7A8A' } },
                    'قبلاً ثبت‌نام کردی؟ ',
                    React.createElement('span', {
                        style: { color: '#2563EB', fontWeight: 700, cursor: 'pointer' },
                        onClick: goLogin
                    }, 'ورود')
                )
            );
        }

        // ============================================================
        //  داشبورد ادمین
        // ============================================================

        function AdminDashboard({ teacher, onNavigate, refresh }) {
            const teachers = loadAll('teacher:').filter(t => t.username !== teacher.username);
            const exams = loadAll('exam:');
            const classes = loadAll('class:');
            const students = loadAll('student:');

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'header' },
                    React.createElement('h1', null, '📊 داشبورد مدیر'),
                    React.createElement('div', { className: 'user' },
                        teacher.fullname,
                        React.createElement('span', { style: { margin: '0 8px' } }, '|'),
                        React.createElement('span', { style: { cursor: 'pointer', color: '#DC2626' },
                            onClick: () => { localStorage.clear();
                                location.reload(); } }, 'خروج')
                    )
                ),

                React.createElement('div', { className: 'stats' },
                    React.createElement('div', { className: 'stat-box' },
                        React.createElement('div', { className: 'num' }, teachers.length),
                        React.createElement('div', { className: 'label' }, 'معلمان')
                    ),
                    React.createElement('div', { className: 'stat-box' },
                        React.createElement('div', { className: 'num' }, exams.length),
                        React.createElement('div', { className: 'label' }, 'آزمون‌ها')
                    ),
                    React.createElement('div', { className: 'stat-box' },
                        React.createElement('div', { className: 'num' }, classes.length),
                        React.createElement('div', { className: 'label' }, 'کلاس‌ها')
                    ),
                    React.createElement('div', { className: 'stat-box' },
                        React.createElement('div', { className: 'num' }, students.length),
                        React.createElement('div', { className: 'label' }, 'دانش‌آموزان')
                    )
                ),

                React.createElement('div', { className: 'flex', style: { marginBottom: 16 } },
                    React.createElement(Button, { onClick: () => onNavigate('teachers') }, '👨‍🏫 مدیریت معلمان'),
                    React.createElement(Button, { variant: 'ghost', onClick: () => onNavigate('all-exams') },
                        '📝 همه آزمون‌ها')
                ),

                React.createElement('div', { className: 'border-top' },
                    React.createElement('h2', null, 'معلمان'),
                    teachers.length === 0 ?
                    React.createElement(EmptyState, { text: 'هنوز معلمی اضافه نشده.' }) :
                    teachers.map(t =>
                        React.createElement('div', { className: 'list-item', key: t.username },
                            React.createElement('div', null,
                                React.createElement('div', { className: 'title' }, t.fullname),
                                React.createElement('div', { className: 'sub' }, '👤 ' + t.username)
                            ),
                            React.createElement(Badge, { tone: 'blue' }, 'معلم')
                        )
                    )
                )
            );
        }

        // ============================================================
        //  مدیریت معلمان (فقط ادمین)
        // ============================================================

        function TeachersScreen({ teacher, onBack, refresh }) {
            const [showModal, setShowModal] = React.useState(false);
            const [fullname, setFullname] = React.useState('');
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [email, setEmail] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const teachers = loadAll('teacher:').filter(t => t.username !== teacher.username);

            const addTeacher = () => {
                setError('');
                if (!fullname || !username || !password || !email) {
                    setError('همه فیلدها را پر کنید.');
                    return;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    setError('ایمیل معتبر نیست.');
                    return;
                }
                if (password.length < 4) {
                    setError('رمز عبور باید حداقل ۴ کاراکتر باشد.');

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'header' },
                    React.createElement('h1', null, '👨‍🎓 ' + classroom.name),
                    React.createElement(Button, { variant: 'ghost', onClick: onBack }, '🔙 بازگشت')
                ),

                React.createElement('div', { style: { background: '#F8FAFC', padding: 12, borderRadius: 12,
                        marginBottom: 16 } },
                    React.createElement('div', { className: 'flex' },
                        React.createElement(TextInput, {
                            value: name,
                            onChange: setName,
                            placeholder: 'نام دانش‌آموز',
                            style: { flex: 1 }
                        }),
                        React.createElement(Button, { onClick: addStudent, disabled: saving },
                            saving ? '...' : '➕'
                        )
                    )
                ),

                roster.length === 0 ?
                React.createElement(EmptyState, { text: 'هنوز دانش‌آموزی اضافه نشده.' }) :
                roster.map(s =>
                    React.createElement('div', { className: 'list-item', key: s.id },
                        React.createElement('div', null,
                            React.createElement('div', { className: 'title' }, s.fullname),
                            React.createElement('div', { className: 'sub' },
                                React.createElement('span', { className: 'code-display' }, s.code)
                            )
                        ),
                        React.createElement(Button, {
                            className: 'btn-sm',
                            variant: 'danger',
                            onClick: () => removeStudent(s.id)
                        }, '🗑️')
                    )
                )
            );
        }

        // ============================================================
        //  مدیریت دانش‌آموزان (معلم) - لیست همه
        // ============================================================

        function StudentsScreen({ teacher, onBack, refresh }) {
            const roster = loadAll('roster:').filter(r => r.teacher_id === teacher.username);
            const classes = loadAll('class:').filter(c => c.teacher_id === teacher.username);

            const getClassName = (id) => {
                const c = classes.find(c => c.id === id);
                return c ? c.name : '—';
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'header' },
                    React.createElement('h1', null, '👨‍🎓 همه دانش‌آموزان'),
                    React.createElement(Button, { variant: 'ghost', onClick: onBack }, '🔙 بازگشت')
                ),

                roster.length === 0 ?
                React.createElement(EmptyState, { text: 'هنوز دانش‌آموزی ثبت نشده.' }) :
                roster.map(s =>
                    React.createElement('div', { className: 'list-item', key: s.id },
                        React.createElement('div', null,
                            React.createElement('div', { className: 'title' }, s.fullname),
                            React.createElement('div', { className: 'sub' },
                                'کلاس: ' + getClassName(s.class_id),
                                ' · کد: ' + React.createElement('span', { className: 'code-display' },
                                    s.code)
                            )
                        ),
                        React.createElement(Badge, { tone: 'blue' }, 'دانش‌آموز')
                    )
                )
            );
        }

        // ============================================================
        //  اپلیکیشن اصلی
        // ============================================================

        function App() {
            const [teacher, setTeacher] = React.useState(null);
            const [view, setView] = React.useState('login');
            const [activeExamId, setActiveExamId] = React.useState(null);
            const [activeClassId, setActiveClassId] = React.useState(null);

            const refresh = () => {};

            // چک کردن وجود مدیر
            const adminExists = loadAll('teacher:').length > 0;

            if (!teacher) {
                if (view === 'register' || !adminExists) {
                    return React.createElement(RegisterScreen, {
                        onRegistered: t => { setTeacher(t);
                            setView('dashboard'); },
                        goLogin: () => setView('login')
                    });
                }
                return React.createElement(LoginScreen, {
                    onLogin: t => { setTeacher(t);
                        setView('dashboard'); },
                    onRegister: () => setView('register')
                });
            }

            const navigate = (page, id) => {
                if (page === 'dashboard') { setView('dashboard');
                    setActiveExamId(null);
                    setActiveClassId(null); }
                if (page === 'exams') { setView('exams'); }
                if (page === 'questions' && id) { setView('questions');
                    setActiveExamId(id); }
                if (page === 'classes') { setView('classes'); }
                if (page === 'roster' && id) { setView('roster');
                    setActiveClassId(id); }
                if (page === 'students') { setView('students'); }
                if (page === 'teachers') { setView('teachers'); }
                if (page === 'all-exams') { setView('all-exams'); }
            };

            const exam = loadAll('exam:').find(e => e.id === activeExamId);
            const classroom = loadAll('class:').find(c => c.id === activeClassId);

            // ادمین
            if (teacher.role === 'admin') {
                if (view === 'teachers') {
                    return React.createElement(TeachersScreen, { teacher, onBack: () => setView('dashboard'),
                        refresh });
                }
                if (view === 'all-exams') {
                    return React.createElement(AllExamsScreen, { onBack: () => setView('dashboard'), refresh });
                }
                return React.createElement(AdminDashboard, { teacher, onNavigate: navigate, refresh });
            }

            // معلم
            if (view === 'exams') {
                return React.createElement(ExamsScreen, { teacher, onBack: () => setView('dashboard'),
                    onNavigate: navigate, refresh });
            }
            if (view === 'questions' && exam) {
                return React.createElement(QuestionsScreen, { exam, onBack: () => setView('exams'), refresh });
            }
            if (view === 'classes') {
                return React.createElement(ClassesScreen, { teacher, onBack: () => setView('dashboard'),
                    onNavigate: navigate, refresh });
            }
            if (view === 'roster' && classroom) {
                return React.createElement(RosterScreen, { classroom, teacher, onBack: () => setView('classes'),
                    refresh });
            }
            if (view === 'students') {
                return React.createElement(StudentsScreen, { teacher, onBack: () => setView('dashboard'), refresh });
            }

            return React.createElement(TeacherDashboard, { teacher, onNavigate: navigate, refresh });
        }

        // ============================================================
        //  رندر
        // ============================================================

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
        console.log('🏫 سامانه مدرسه با موفقیت اجرا شد!');
    </script>
</body>
  </html>

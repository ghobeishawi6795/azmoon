<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سامانه آزمون مدرسه</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #F8FAFC;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #root {
            width: 100%;
            max-width: 500px;
        }
        .card {
            background: white;
            border-radius: 22px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(19, 42, 82, 0.15);
        }
        .logo {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            background: #2563EB;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 32px;
            color: white;
        }
        h1 {
            font-size: 22px;
            font-weight: 900;
            color: #1E293B;
            text-align: center;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 13px;
            color: #64748B;
            text-align: center;
            margin-bottom: 26px;
        }
        .field {
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #3A4A63;
            margin-bottom: 5px;
        }
        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1.5px solid #E2E8F0;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            background: white;
            color: #1E293B;
            transition: border-color 0.15s;
        }
        input:focus,
        select:focus,
        textarea:focus {
            border-color: #2563EB;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper input {
            padding-left: 44px;
        }
        .eye {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #94A3B8;
            user-select: none;
        }
        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #2563EB;
            color: white;
            font-size: 15px;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.1s;
            margin-top: 6px;
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            opacity: 0.6;
            transform: none;
        }
        .btn-success {
            background: #16A34A;
        }
        .btn-danger {
            background: #FEF2F2;
            color: #DC2626;
        }
        .btn-ghost {
            background: #F1F5F9;
            color: #334155;
        }
        .btn-sm {
            padding: 8px 14px;
            font-size: 13px;
            width: auto;
            display: inline-block;
            margin: 4px;
        }
        .error {
            color: #DC2626;
            font-size: 13px;
            margin: 10px 0;
            text-align: center;
        }
        .success {
            color: #16A34A;
            font-size: 13px;
            margin: 10px 0;
            text-align: center;
        }
        .flex {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .flex-center {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .mt-10 {
            margin-top: 10px;
        }
        .mb-10 {
            margin-bottom: 10px;
        }
        .text-center {
            text-align: center;
        }
        .badge {
            display: inline-block;
            background: #F1F5F9;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #475569;
        }
        .badge-blue {
            background: #EFF6FF;
            color: #2563EB;
        }
        .badge-green {
            background: #F0FDF4;
            color: #16A34A;
        }
        .badge-orange {
            background: #FFFBEB;
            color: #D97706;
        }
        .badge-red {
            background: #FEF2F2;
            color: #DC2626;
        }
        .exam-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #F1F5F9;
        }
        .exam-item .title {
            font-weight: 700;
            color: #1E293B;
            font-size: 14px;
        }
        .exam-item .meta {
            font-size: 11px;
            color: #94A3B8;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: #F8FAFC;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card .num {
            font-size: 22px;
            font-weight: 900;
            color: #1E293B;
        }
        .stat-card .label {
            font-size: 11px;
            color: #64748B;
        }
        .hidden {
            display: none !important;
        }
        .w-full {
            width: 100%;
        }
        .gap-8 {
            gap: 8px;
        }
        .mt-16 {
            margin-top: 16px;
        }
        .border-top {
            border-top: 1px solid #EEF1F6;
            padding-top: 16px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        'use strict';

        // ============================================================
        //  کتابخانه React مینیاتوری (آفلاین)
        // ============================================================

        const React = {
            createElement: function(type, props, ...children) {
                if (typeof type === 'function') {
                    return type(props || {});
                }
                const element = document.createElement(type);
                if (props) {
                    for (const key in props) {
                        if (key === 'className') {
                            element.className = props[key];
                        } else if (key === 'style' && typeof props[key] === 'object') {
                            Object.assign(element.style, props[key]);
                        } else if (key.startsWith('on') && typeof props[key] === 'function') {
                            const eventName = key.substring(2).toLowerCase();
                            element.addEventListener(eventName, props[key]);
                        } else if (key === 'dangerouslySetInnerHTML') {
                            element.innerHTML = props[key].__html;
                        } else if (key === 'value' || key === 'type' || key === 'placeholder' || key === 'disabled' ||
                            key === 'rows' || key === 'min' || key === 'max') {
                            element[key] = props[key];
                        } else {
                            element.setAttribute(key, props[key]);
                        }
                    }
                }
                for (const child of children) {
                    if (child === null || child === undefined || child === false) continue;
                    if (typeof child === 'string' || typeof child === 'number') {
                        element.appendChild(document.createTextNode(String(child)));
                    } else if (child instanceof Node) {
                        element.appendChild(child);
                    } else if (Array.isArray(child)) {
                        for (const subChild of child) {
                            if (subChild instanceof Node) {
                                element.appendChild(subChild);
                            }
                        }
                    }
                }
                return element;
            },
            useState: function(initialValue) {
                const state = {
                    value: typeof initialValue === 'function' ? initialValue() : initialValue,
                    listeners: []
                };
                const setState = function(newValue) {
                    const nextValue = typeof newValue === 'function' ? newValue(state.value) : newValue;
                    if (nextValue !== state.value) {
                        state.value = nextValue;
                        for (const listener of state.listeners) {
                            listener();
                        }
                    }
                };
                const getValue = function() { return state.value; };
                const result = [getValue, setState];
                result._addListener = function(listener) { state.listeners.push(listener); };
                return result;
            },
            useEffect: function(effect, deps) {
                const isFirstRun = true;
                if (isFirstRun) { effect(); }
            },
            useCallback: function(callback, deps) { return callback; },
            useRef: function(initialValue) { return { current: initialValue }; }
        };

        const ReactDOM = {
            createRoot: function(container) {
                return {
                    render: function(element) {
                        container.innerHTML = '';
                        if (element instanceof Node) {
                            container.appendChild(element);
                        }
                    }
                };
            }
        };

        // ============================================================
        //  ابزارهای کمکی (KV helpers با localStorage)
        // ============================================================

        const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

        function getJSON(key) {
            try {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : null;
            } catch { return null; }
        }

        function setJSON(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
                return true;
            } catch { return false; }
        }

        function deleteKey(key) {
            try { localStorage.removeItem(key); return true; } catch { return false; }
        }

        function listPrefix(prefix) {
            try {
                const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix));
                return keys;
            } catch { return []; }
        }

        function loadAll(prefix) {
            const keys = listPrefix(prefix);
            const items = keys.map(k => getJSON(k));
            return items.filter(Boolean);
        }

        function generateCode(existingCodes) {
            let code;
            do {
                code = String(Math.floor(100000 + Math.random() * 900000));
            } while (existingCodes.includes(code));
            return code;
        }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function awardedMarkOf(a) {
            if (a.awarded_mark != null) return a.awarded_mark;
            return a.is_correct ? a.mark : 0;
        }

        // ============================================================
        //  کامپوننت‌های UI
        // ============================================================

        function Field({ label, children }) {
            return React.createElement('div', { className: 'field' },
                React.createElement('label', null, label),
                children
            );
        }

        function Button({ children, variant = 'primary', style, onClick, disabled, className = '' }) {
            const variants = {
                primary: { background: '#2563EB', color: '#fff' },
                ghost: { background: '#F1F5F9', color: '#334155' },
                danger: { background: '#FEF2F2', color: '#DC2626' },
                success: { background: '#16A34A', color: '#fff' },
            };
            const baseStyle = {
                padding: '10px 18px',
                borderRadius: 10,
                fontSize: 14,
                fontWeight: 700,
                cursor: 'pointer',
                fontFamily: 'inherit',
                border: 'none',
                transition: 'all 0.1s',
                ...variants[variant],
                ...style
            };
            return React.createElement('button', {
                style: baseStyle,
                onClick: onClick,
                disabled: disabled,
                className: className
            }, children);
        }

        function TextInput({ value, onChange, placeholder, type = 'text', style = {}, ...props }) {
            return React.createElement('input', {
                type: type,
                value: value,
                onChange: (e) => onChange(e.target.value),
                placeholder: placeholder,
                style: { width: '100%', padding: '11px 14px', borderRadius: 10, border: '1.5px solid #E2E8F0',
                    fontSize: 14, outline: 'none', fontFamily: 'inherit', background: '#fff',
                    color: '#1E293B', ...style },
                ...props
            });
        }

        function Badge({ children, tone = 'blue' }) {
            const tones = {
                blue: { bg: '#EFF6FF', fg: '#2563EB' },
                green: { bg: '#F0FDF4', fg: '#16A34A' },
                orange: { bg: '#FFFBEB', fg: '#D97706' },
                red: { bg: '#FEF2F2', fg: '#DC2626' },
                gray: { bg: '#F1F5F9', fg: '#475569' },
            };
            const t = tones[tone] || tones.gray;
            return React.createElement('span', {
                style: { background: t.bg, color: t.fg, fontSize: 12, fontWeight: 700, padding: '4px 10px',
                    borderRadius: 999, display: 'inline-block' }
            }, children);
        }

        function StatCard({ label, value, color = '#2563EB' }) {
            return React.createElement('div', { className: 'stat-card' },
                React.createElement('div', { className: 'num', style: { color: color } }, value),
                React.createElement('div', { className: 'label' }, label)
            );
        }

        function Modal({ title, children, onClose }) {
            return React.createElement('div', {
                style: { position: 'fixed', inset: 0, background: 'rgba(15,23,42,.5)', display: 'flex',
                    alignItems: 'center', justifyContent: 'center', zIndex: 50, padding: 16 }
            },
                React.createElement('div', {
                    style: { background: '#fff', borderRadius: 18, padding: 26, width: '100%', maxWidth: 420,
                        maxHeight: '88vh', overflowY: 'auto' },
                    onClick: (e) => e.stopPropagation()
                },
                    React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between',
                            alignItems: 'center', marginBottom: 18 } },
                        React.createElement('div', { style: { fontSize: 17, fontWeight: 800, color: '#1E293B' } },
                            title),
                        React.createElement('span', {
                            style: { cursor: 'pointer', color: '#94A3B8', fontSize: 20 },
                            onClick: onClose
                        }, '✕')
                    ),
                    children
                )
            );
        }

        function EmptyState({ text, actionLabel, onAction }) {
            return React.createElement('div', { style: { textAlign: 'center', padding: '30px 20px' } },
                React.createElement('div', { style: { fontSize: 14, color: '#64748B', marginBottom: 16 } }, text),
                actionLabel && React.createElement(Button, { onClick: onAction }, actionLabel)
            );
        }

        // ============================================================
        //  صفحه ورود
        // ============================================================

        function LoginScreen({ onLogin, onRegister }) {
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [showPw, setShowPw] = React.useState(false);

            const handleSubmit = () => {
                setError('');
                if (!username || !password) {
                    setError('نام کاربری و رمز عبور را وارد کنید.');
                    return;
                }
                setLoading(true);
                const teacher = getJSON(`teacher:${username}`);
                setTimeout(() => {
                    setLoading(false);
                    if (!teacher || teacher.password !== password) {
                        setError('نام کاربری یا رمز عبور اشتباه است.');
                        return;
                    }
                    onLogin(teacher);
                }, 300);
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'logo' }, '🎓'),
                React.createElement('h1', null, 'سامانه آزمون مدرسه'),
                React.createElement('div', { className: 'subtitle' }, 'ورود به پنل معلم / مدیر'),

                React.createElement(Field, { label: 'نام کاربری' },
                    React.createElement(TextInput, {
                        value: username,
                        onChange: setUsername,
                        placeholder: 'نام کاربری را وارد کنید',
                        onKeyDown: (e) => e.key === 'Enter' && handleSubmit()
                    })
                ),

                React.createElement(Field, { label: 'رمز عبور' },
                    React.createElement('div', { className: 'input-wrapper' },
                        React.createElement(TextInput, {
                            type: showPw ? 'text' : 'password',
                            value: password,
                            onChange: setPassword,
                            placeholder: 'رمز عبور را وارد کنید',
                            onKeyDown: (e) => e.key === 'Enter' && handleSubmit()
                        }),
                        React.createElement('span', {
                            className: 'eye',
                            onClick: () => setShowPw(!showPw)
                        }, showPw ? '🙈' : '👁️')
                    )
                ),

                error && React.createElement('div', { className: 'error' }, error),

                React.createElement(Button, {
                    onClick: handleSubmit,
                    disabled: loading,
                    style: { width: '100%', justifyContent: 'center', padding: '12px 0', fontSize: 15 }
                }, loading ? 'در حال ورود...' : 'ورود'),

                React.createElement('div', { className: 'footer', style: { textAlign: 'center', marginTop: 18,
                        fontSize: 13, color: '#94A3B8' } },
                    'حساب نداری؟ ',
                    React.createElement('span', {
                        style: { color: '#2563EB', fontWeight: 700, cursor: 'pointer' },
                        onClick: onRegister
                    }, 'ثبت‌نام')
                )
            );
        }

        // ============================================================
        //  صفحه ثبت‌نام
        // ============================================================

        function RegisterScreen({ onRegistered, goLogin }) {
            const [fullname, setFullname] = React.useState('');
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [email, setEmail] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const handleSubmit = () => {
                setError('');
                if (!fullname || !username || !password || !email) {
                    setError('همه فیلدها را پر کنید.');
                    return;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    setError('ایمیل معتبر نیست.');
                    return;
                }
                if (password.length < 4) {
                    setError('رمز عبور باید حداقل ۴ کاراکتر باشد.');
                    return;
                }
                setLoading(true);
                const existing = getJSON(`teacher:${username}`);
                if (existing) {
                    setLoading(false);
                    setError('این نام کاربری قبلاً ثبت شده است.');
                    return;
                }
                const teacher = {
                    username,
                    password,
                    fullname,
                    email,
                    role: 'admin',
                    created_at: new Date().toISOString()
                };
                setJSON(`teacher:${username}`, teacher);
                setLoading(false);
                onRegistered(teacher);
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'logo' }, '📝'),
                React.createElement('h1', null, 'ثبت‌نام مدیر'),
                React.createElement('div', { className: 'subtitle' }, 'فقط یک‌بار برای راه‌اندازی سامانه'),

                React.createElement(Field, { label: 'نام و نام‌خانوادگی' },
                    React.createElement(TextInput, { value: fullname, onChange: setFullname,
                        placeholder: 'مثلاً: علی محمدی' })
                ),
                React.createElement(Field, { label: 'نام کاربری' },
                    React.createElement(TextInput, { value: username, onChange: setUsername,
                        placeholder: 'یک نام کاربری یکتا' })
                ),
                React.createElement(Field, { label: 'رمز عبور' },
                    React.createElement(TextInput, { type: 'password', value: password, onChange: setPassword,
                        placeholder: 'حداقل ۴ کاراکتر' })
                ),
                React.createElement(Field, { label: 'ایمیل' },
                    React.createElement(TextInput, { type: 'email', value: email, onChange: setEmail,
                        placeholder: 'برای بازیابی رمز عبور' })
                ),

                error && React.createElement('div', { className: 'error' }, error),

                React.createElement(Button, {
                    onClick: handleSubmit,
                    disabled: loading,
                    style: { width: '100%', justifyContent: 'center', padding: '12px 0', fontSize: 15 }
                }, loading ? 'در حال ثبت...' : 'ثبت‌نام'),

                React.createElement('div', { style: { textAlign: 'center', marginTop: 18, fontSize: 13,
                        color: '#94A3B8' } },
                    'قبلاً ثبت‌نام کردی؟ ',
                    React.createElement('span', {
                        style: { color: '#2563EB', fontWeight: 700, cursor: 'pointer' },
                        onClick: goLogin
                    }, 'ورود')
                )
            );
        }

        // ============================================================
        //  داشبورد معلم
        // ============================================================

        function DashboardScreen({ teacher, exams, questions, students, answers, onNavigate }) {
            const myExams = exams.filter(e => e.teacher_id === teacher.username);
            const myExamIds = new Set(myExams.map(e => e.id));
            const myQuestions = questions.filter(q => myExamIds.has(q.exam_id));
            const myStudents = students.filter(s => s.teacher_id === teacher.username);

            const allScores = [];
            answers.forEach(a => {
                if (!myExamIds.has(a.exam_id)) return;
                const total = a.mark || 1;
                const got = awardedMarkOf(a);
                allScores.push({ total, got });
            });
            const totalMarks = allScores.reduce((s, a) => s + a.total, 0);
            const gotMarks = allScores.reduce((s, a) => s + a.got, 0);
            const avgScore = totalMarks ? Math.round((gotMarks / totalMarks) * 100) : 0;

            const recentExams = [...myExams].sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 5);

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'logo' }, '📊'),
                React.createElement('h1', null, 'داشبورد معلم'),
                React.createElement('div', { className: 'subtitle' }, teacher.fullname),

                React.createElement('div', { className: 'stats' },
                    React.createElement(StatCard, { label: 'آزمون‌ها', value: myExams.length, color: '#2563EB' }),
                    React.createElement(StatCard, { label: 'سوالات', value: myQuestions.length, color: '#8B5CF6' }),
                    React.createElement(StatCard, { label: 'دانش‌آموزان', value: myStudents.length,
                        color: '#0EA5E9' }),
                    React.createElement(StatCard, { label: 'میانگین نمرات', value: avgScore + '%',
                        color: '#16A34A' })
                ),

                React.createElement('div', { className: 'flex', style: { marginBottom: 16 } },
                    React.createElement(Button, { variant: 'primary', onClick: () => onNavigate('exams') },
                        '📝 مدیریت آزمون‌ها'),
                    React.createElement(Button, { variant: 'ghost', onClick: () => onNavigate('classes') },
                        '📚 کلاس‌ها')
                ),

                React.createElement('div', { className: 'border-top' },
                    React.createElement('div', { style: { fontSize: 14, fontWeight: 800, color: '#1E293B',
                            marginBottom: 12 } }, 'آزمون‌های اخیر'),
                    recentExams.length === 0 ?
                    React.createElement(EmptyState, { text: 'هنوز آزمونی نساخته‌ای.' }) :
                    recentExams.map(ex => {
                        const qCount = questions.filter(q => q.exam_id === ex.id).length;
                        return React.createElement('div', { className: 'exam-item', key: ex.id },
                            React.createElement('div', null,
                                React.createElement('div', { className: 'title' }, ex.title),
                                React.createElement('div', { className: 'meta' }, qCount +
                                    ' سوال · ' + new Date(ex.created_at).toLocaleDateString(
                                    'fa-IR'))
                            ),
                            React.createElement(Button, {
                                variant: 'ghost',
                                style: { padding: '6px 12px', fontSize: 12 },
                                onClick: () => onNavigate('exams')
                            }, 'مدیریت')
                        );
                    })
                )
            );
        }

        // ============================================================
        //  مدیریت آزمون‌ها
        // ============================================================

        function ExamsScreen({ teacher, exams, questions, answers, classes, onNavigate, refresh }) {
            const [showCreate, setShowCreate] = React.useState(false);
            const [title, setTitle] = React.useState('');
            const [duration, setDuration] = React.useState('');
            const [accessCode, setAccessCode] = React.useState('');
            const [saving, setSaving] = React.useState(false);

            const myExams = exams.filter(e => e.teacher_id === teacher.username)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const createExam = () => {
                if (!title.trim()) return;
                setSaving(true);
                const id = uid();
                setJSON(`exam:${id}`, {
                    id,
                    title: title.trim(),
                    teacher_id: teacher.username,
                    duration_minutes: Number(duration) || null,
                    access_code: accessCode.trim() || null,
                    created_at: new Date().toISOString()
                });
                setSaving(false);
                setTitle('');
                setDuration('');
                setAccessCode('');
                setShowCreate(false);
                refresh();
            };

            const removeExam = (examId) => {
                if (!confirm('این آزمون حذف شود؟')) return;
                deleteKey(`exam:${examId}`);
                const qs = questions.filter(q => q.exam_id === examId);
                qs.forEach(q => deleteKey(`question:${q.id}`));
                refresh();
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'logo' }, '📝'),
                React.createElement('h1', null, 'آزمون‌ها'),
                React.createElement('div', { className: 'subtitle' }, 'مدیریت آزمون‌های خود'),

                React.createElement('div', { className: 'flex', style: { marginBottom: 16 } },
                    React.createElement(Button, { onClick: () => setShowCreate(true) }, '➕ آزمون جدید'),
                    React.createElement(Button, { variant: 'ghost', onClick: () => onNavigate('dashboard') },
                        '🔙 بازگشت')
                ),

                myExams.length === 0 ?
                React.createElement(EmptyState, { text: 'هنوز آزمونی نساخته‌ای.' }) :
                myExams.map(ex => {
                    const qCount = questions.filter(q => q.exam_id === ex.id).length;
                    return React.createElement('div', { className: 'exam-item', key: ex.id },
                        React.createElement('div', null,
                            React.createElement('div', { className: 'title' }, ex.title),
                            React.createElement('div', { className: 'meta' },
                                qCount + ' سوال',
                                ex.duration_minutes ? ` · ${ex.duration_minutes} دقیقه` : '',
                                ` · ${new Date(ex.created_at).toLocaleDateString('fa-IR')}`
                            )
                        ),
                        React.createElement('div', { className: 'flex' },
                            React.createElement(Button, {
                                variant: 'ghost',
                                style: { padding: '6px 10px', fontSize: 12 },
                                onClick: () => onNavigate('questions', ex.id)
                            }, 'سوالات'),
                            React.createElement(Button, {
                                variant: 'danger',
                                style: { padding: '6px 10px', fontSize: 12 },
                                onClick: () => removeExam(ex.id)
                            }, '🗑️')
                        )
                    );
                }),

                showCreate && React.createElement(Modal, { title: 'ساخت آزمون جدید', onClose: () => setShowCreate(
                        false) },
                    React.createElement(Field, { label: 'عنوان آزمون' },
                        React.createElement(TextInput, { value: title, onChange: setTitle,
                            placeholder: 'مثلاً: ریاضی فصل ۴' })
                    ),
                    React.createElement(Field, { label: 'مدت زمان (دقیقه)' },
                        React.createElement(TextInput, { type: 'number', value: duration, onChange: setDuration,
                            placeholder: 'اختیاری' })
                    ),
                    React.createElement(Field, { label: 'کد دسترسی' },
                        React.createElement(TextInput, { value: accessCode, onChange: setAccessCode,
                            placeholder: 'اختیاری' })
                    ),
                    React.createElement('div', { className: 'flex', style: { marginTop: 16,
                            justifyContent: 'flex-end' } },
                        React.createElement(Button, { variant: 'ghost', onClick: () => setShowCreate(false) },
                            'انصراف'),
                        React.createElement(Button, { onClick: createExam, disabled: saving },
                            saving ? 'در حال ساخت...' : 'ساخت آزمون'
                        )
                    )
                )
            );
        }

        // ============================================================
        //  مدیریت سوالات
        // ============================================================

        function QuestionsScreen({ exam, questions, teacher, onBack, refresh }) {
            const examQuestions = questions.filter(q => q.exam_id === exam.id);
            const [qText, setQText] = React.useState('');
            const [mark, setMark] = React.useState(1);
            const [saving, setSaving] = React.useState(false);

            const addQuestion = () => {
                if (!qText.trim()) return;
                setSaving(true);
                const id = uid();
                setJSON(`question:${id}`, {
                    id,
                    exam_id: exam.id,
                    question_text: qText.trim(),
                    mark: Number(mark) || 1,
                    type: 'mc',
                    option_a: 'گزینه اول',
                    option_b: 'گزینه دوم',
                    option_c: 'گزینه سوم',
                    option_d: 'گزینه چهارم',
                    correct_answer: 'A'
                });
                setSaving(false);
                setQText('');
                setMark(1);
                refresh();
            };

            const removeQuestion = (id) => {
                if (!confirm('این سوال حذف شود؟')) return;
                deleteKey(`question:${id}`);
                refresh();
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'logo' }, '❓'),
                React.createElement('h1', null, exam.title),
                React.createElement('div', { className: 'subtitle' }, 'مدیریت سوالات'),

                React.createElement('div', { style: { marginBottom: 16 } },
                    React.createElement(Button, { variant: 'ghost', onClick: onBack }, '🔙 بازگشت به آزمون‌ها')
                ),

                React.createElement('div', { style: { background: '#F8FAFC', padding: 16, borderRadius: 12,
                        marginBottom: 16 } },
                    React.createElement(Field, { label: 'متن سوال' },
                        React.createElement(TextInput, { value: qText, onChange: setQText,
                            placeholder: 'متن سوال را وارد کنید' })
                    ),
                    React.createElement(Field, { label: 'نمره' },
                        React.createElement(TextInput, { type: 'number', value: mark, onChange: setMark,
                            style: { maxWidth: 100 } })
                    ),
                    React.createElement(Button, { onClick: addQuestion, disabled: saving },
                        saving ? 'در حال افزودن...' : '➕ افزودن سوال'
                    )
                ),

                examQuestions.length === 0 ?
                React.createElement(EmptyState, { text: 'هنوز سوالی اضافه نشده.' }) :
                examQuestions.map((q, idx) =>
                    React.createElement('div', { className: 'exam-item', key: q.id },
                        React.createElement('div', null,
                            React.createElement('div', { className: 'title' }, `${idx + 1}. ${q.question_text}`),
                            React.createElement('div', { className: 'meta' }, `نمره: ${q.mark}`)
                        ),
                        React.createElement(Button, {
                            variant: 'danger',
                            style: { padding: '6px 10px', fontSize: 12 },
                            onClick: () => removeQuestion(q.id)
                        }, '🗑️')
                    )
                )
            );
        }

        // ============================================================
        //  مدیریت کلاس‌ها
        // ============================================================

        function ClassesScreen({ teacher, classes, roster, onNavigate, refresh }) {
            const [showCreate, setShowCreate] = React.useState(false);
            const [className, setClassName] = React.useState('');
            const [saving, setSaving] = React.useState(false);

            const myClasses = classes.filter(c => c.teacher_id === teacher.username);

            const createClass = () => {
                if (!className.trim()) return;
                setSaving(true);
                const id = uid();
                setJSON(`class:${id}`, {
                    id,
                    name: className.trim(),
                    teacher_id: teacher.username,
                    created_at: new Date().toISOString()
                });
                setSaving(false);
                setClassName('');
                setShowCreate(false);
                refresh();
            };

            const removeClass = (id) => {
                if (!confirm('این کلاس حذف شود؟')) return;
                deleteKey(`class:${id}`);
                const members = roster.filter(r => r.class_id === id);
                members.forEach(m => deleteKey(`roster:${m.id}`));
                refresh();
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'logo' }, '📚'),
                React.createElement('h1', null, 'کلاس‌ها'),
                React.createElement('div', { className: 'subtitle' }, 'مدیریت کلاس‌های شما'),

                React.createElement('div', { className: 'flex', style: { marginBottom: 16 } },
                    React.createElement(Button, { onClick: () => setShowCreate(true) }, '➕ کلاس جدید'),
                    React.createElement(Button, { variant: 'ghost', onClick: () => onNavigate('dashboard') },
                        '🔙 بازگشت')
                ),

                myClasses.length === 0 ?
                React.createElement(EmptyState, { text: 'هنوز کلاسی نساخته‌ای.' }) :
                myClasses.map(c => {
                    const count = roster.filter(r => r.class_id === c.id).length;
                    return React.createElement('div', { className: 'exam-item', key: c.id },
                        React.createElement('div', null,
                            React.createElement('div', { className: 'title' }, c.name),
                            React.createElement('div', { className: 'meta' }, count + ' دانش‌آموز')
                        ),
                        React.createElement('div', { className: 'flex' },
                            React.createElement(Button, {
                                variant: 'ghost',
                                style: { padding: '6px 10px', fontSize: 12 },
                                onClick: () => onNavigate('roster', c.id)
                            }, 'دانش‌آموزان'),
                            React.createElement(Button, {
                                variant: 'danger',
                                style: { padding: '6px 10px', fontSize: 12 },
                                onClick: () => removeClass(c.id)
                            }, '🗑️')
                        )
                    );
                }),

                showCreate && React.createElement(Modal, { title: 'افزودن کلاس جدید', onClose: () => setShowCreate(
                        false) },
                    React.createElement(Field, { label: 'نام کلاس' },
                        React.createElement(TextInput, { value: className, onChange: setClassName,
                            placeholder: 'مثلاً: هفتم الف' })
                    ),
                    React.createElement('div', { className: 'flex', style: { marginTop: 16,
                            justifyContent: 'flex-end' } },
                        React.createElement(Button, { variant: 'ghost', onClick: () => setShowCreate(false) },
                            'انصراف'),
                        React.createElement(Button, { onClick: createClass, disabled: saving },
                            saving ? 'در حال ساخت...' : 'ساخت کلاس'
                        )
                    )
                )
            );
        }

        // ============================================================
        //  مدیریت دانش‌آموزان (Roster)
        // ============================================================

        function RosterScreen({ classroom, roster, teacher, onBack, refresh }) {
            const members = roster.filter(r => r.class_id === classroom.id);
            const [name, setName] = React.useState('');
            const [saving, setSaving] = React.useState(false);

            const addStudent = () => {
                if (!name.trim()) return;
                setSaving(true);
                const allCodes = roster.filter(r => r.teacher_id === teacher.username).map(r => r.code);
                const id = uid();
                const code = generateCode(allCodes);
                setJSON(`roster:${id}`, {
                    id,
                    class_id: classroom.id,
                    teacher_id: teacher.username,
                    fullname: name.trim(),
                    code,
                    created_at: new Date().toISOString()
                });
                setSaving(false);
                setName('');
                refresh();
            };

            const removeStudent = (id) => {
                if (!confirm('این دانش‌آموز حذف شود؟')) return;
                deleteKey(`roster:${id}`);
                refresh();
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'logo' }, '👨‍🎓'),
                React.createElement('h1', null, classroom.name),
                React.createElement('div', { className: 'subtitle' }, 'مدیریت دانش‌آموزان'),

                React.createElement(Button, { variant: 'ghost', onClick: onBack }, '🔙 بازگشت به کلاس‌ها'),

                React.createElement('div', { style: { background: '#F8FAFC', padding: 16, borderRadius: 12,
                        margin: '16px 0' } },
                    React.createElement('div', { className: 'flex' },
                        React.createElement(TextInput, {
                            value: name,
                            onChange: setName,
                            placeholder: 'نام دانش‌آموز',
                            style: { flex: 1 }
                        }),
                        React.createElement(Button, { onClick: addStudent, disabled: saving },
                            saving ? '...' : '➕'
                        )
                    )
                ),

                members.length === 0 ?
                React.createElement(EmptyState, { text: 'هنوز دانش‌آموزی اضافه نشده.' }) :
                members.map(m =>
                    React.createElement('div', { className: 'exam-item', key: m.id },
                        React.createElement('div', null,
                            React.createElement('div', { className: 'title' }, m.fullname),
                            React.createElement('div', { className: 'meta' }, 'کد: ' + m.code)
                        ),
                        React.createElement(Button, {
                            variant: 'danger',
                            style: { padding: '6px 10px', fontSize: 12 },
                            onClick: () => removeStudent(m.id)
                        }, '🗑️')
                    )
                )
            );
        }

        // ============================================================
        //  اپلیکیشن اصلی
        // ============================================================

        function App() {
            const [teacher, setTeacher] = React.useState(null);
            const [view, setView] = React.useState('login'); // login | register | dashboard | exams | questions | classes |
                roster
            const [activeExamId, setActiveExamId] = React.useState(null);
            const [activeClassId, setActiveClassId] = React.useState(null);

            // داده‌ها
            const [exams, setExams] = React.useState([]);
            const [questions, setQuestions] = React.useState([]);
            const [students, setStudents] = React.useState([]);
            const [answers, setAnswers] = React.useState([]);
            const [classes, setClasses] = React.useState([]);
            const [roster, setRoster] = React.useState([]);

            const refresh = () => {
                setExams(loadAll('exam:'));
                setQuestions(loadAll('question:'));
                setStudents(loadAll('student:'));
                setAnswers(loadAll('answer:'));
                setClasses(loadAll('class:'));
                setRoster(loadAll('roster:'));
            };

            // بارگذاری اولیه
            React.useEffect(() => {
                refresh();
            }, []);

            // چک کردن وجود مدیر
            const adminExists = loadAll('teacher:').length > 0;

            if (!teacher) {
                if (view === 'register' || !adminExists) {
                    return React.createElement(RegisterScreen, {
                        onRegistered: (t) => { setTeacher(t);
                            setView('dashboard');
                            refresh(); },
                        goLogin: () => setView('login')
                    });
                }
                return React.createElement(LoginScreen, {
                    onLogin: (t) => { setTeacher(t);
                        setView('dashboard');
                        refresh(); },
                    onRegister: () => setView('register')
                });
            }

            // ناوبری بین صفحات
            const navigate = (page, id) => {
                if (page === 'dashboard') { setView('dashboard');
                    setActiveExamId(null);
                    setActiveClassId(null); }
                if (page === 'exams') { setView('exams');
                    setActiveExamId(null); }
                if (page === 'questions' && id) { setView('questions');
                    setActiveExamId(id); }
                if (page === 'classes') { setView('classes');
                    setActiveClassId(null); }
                if (page === 'roster' && id) { setView('roster');
                    setActiveClassId(id); }
            };

            const activeExam = exams.find(e => e.id === activeExamId);
            const activeClass = classes.find(c => c.id === activeClassId);

            if (view === 'dashboard') {
                return React.createElement(DashboardScreen, {
                    teacher,
                    exams,
                    questions,
                    students,
                    answers,
                    onNavigate: navigate
                });
            }

            if (view === 'exams') {
                return React.createElement(ExamsScreen, {
                    teacher,
                    exams,
                    questions,
                    answers,
                    classes,
                    onNavigate: navigate,
                    refresh
                });
            }

            if (view === 'questions' && activeExam) {
                return React.createElement(QuestionsScreen, {
                    exam: activeExam,
                    questions,
                    teacher,
                    onBack: () => setView('exams'),
                    refresh
                });
            }

            if (view === 'classes') {
                return React.createElement(ClassesScreen, {
                    teacher,
                    classes,
                    roster,
                    onNavigate: navigate,
                    refresh
                });
            }

            if (view === 'roster' && activeClass) {
                return React.createElement(RosterScreen, {
                    classroom: activeClass,
                    roster,
                    teacher,
                    onBack: () => setView('classes'),
                    refresh
                });
            }

            // fallback
            return React.createElement(DashboardScreen, { teacher, exams, questions, students, answers,
                onNavigate: navigate });
        }

        // ============================================================
        //  رندر کردن
        // ============================================================

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
        console.log('✅ سامانه با موفقیت اجرا شد (آفلاین)');
    </script>
</body>
  </html>

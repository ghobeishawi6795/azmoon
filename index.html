<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سامانه آزمون مدرسه</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,sans-serif;background:#f0f2f5;min-height:100vh}
.card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:15px}
.btn{padding:10px 18px;border:none;border-radius:6px;cursor:pointer;font-size:14px;margin:3px}
.btn-p{background:#2563EB;color:#fff}
.btn-d{background:#DC2626;color:#fff}
.btn-g{background:#f1f5f9;color:#333}
input,textarea,select{padding:10px;border:1px solid #ddd;border-radius:6px;width:100%;margin:5px 0;font-family:inherit}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;text-align:right;border-bottom:1px solid #eee}
th{background:#f8f9fa}
.stat-box{text-align:center;padding:20px;background:#fff;border-radius:10px}
.stat-num{font-size:32px;font-weight:bold;color:#2563EB}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
.sidebar{width:200px;background:#1e293b;color:#fff;padding:20px;min-height:100vh}
.sidebar div{padding:10px;border-radius:6px;cursor:pointer;margin:5px 0}
.sidebar div:hover,.sidebar .active{background:#2563EB}
.main{flex:1;padding:20px}
.flex{display:flex}
.center{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2)}
.login-box{background:#fff;padding:30px;border-radius:12px;width:100%;max-width:400px}
</style>
</head>
<body>
<div id="app"></div>

<script>


    // دیتابیس ساده با localStorage
const DB={
  get:k=>JSON.parse(localStorage.getItem(k)||'null'),
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  all:p=>{const r=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(p))r.push(JSON.parse(localStorage.getItem(k)))}return r},
  del:k=>localStorage.removeItem(k)
};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const genCode=ex=>{let c;do{c=String(Math.floor(100000+Math.random()*900000))}while(ex.includes(c));return c};

let user=DB.get('cu'), page='login', role='teacher', examId=null, classId=null, correctAns=0;

function render(){
  const a=document.getElementById('app');
  if(!user){a.innerHTML=page==='reg'?showReg():showLogin();}
  else if(user.role==='admin'){a.innerHTML=showAdmin();}
  else if(examId){a.innerHTML=showQuestions(examId);}
  else if(classId){a.innerHTML=showStudents(classId);}
  else{a.innerHTML=showTeacher();}
}

function showLogin(){
  return `<div class="center"><div class="login-box">
    <h2 style="text-align:center;margin-bottom:20px">سامانه آزمون مدرسه</h2>
    <div style="display:flex;gap:10px;margin-bottom:15px">
      <button class="btn ${role==='admin'?'btn-p':'btn-g'}" onclick="setRole('admin')">مدیر</button>
      <button class="btn ${role==='teacher'?'btn-p':'btn-g'}" onclick="setRole('teacher')">معلم</button>
    </div>
    <input id="u" placeholder="نام کاربری">
    <input id="p" type="password" placeholder="رمز عبور" onkeypress="if(event.key==='Enter')doLogin()">
    <div id="err" style="color:red;margin:10px 0"></div>
    <button class="btn btn-p" style="width:100%" onclick="doLogin()">ورود</button>
    <p style="text-align:center;margin-top:15px;color:#666">حساب ندارید؟ <a onclick="page='reg';render()" style="color:#2563EB;cursor:pointer">ثبت‌نام</a></p>
  </div></div>`;
}

function showReg(){
  return `<div class="center"><div class="login-box">
    <h2 style="text-align:center;margin-bottom:20px">ثبت‌نام</h2>
    <div style="display:flex;gap:10px;margin-bottom:15px">
      <button class="btn ${role==='admin'?'btn-p':'btn-g'}" onclick="setRole('admin')">مدیر</button>
      <button class="btn ${role==='teacher'?'btn-p':'btn-g'}" onclick="setRole('teacher')">معلم</button>
    </div>
    <input id="n" placeholder="نام و نام‌خانوادگی">
    <input id="u" placeholder="نام کاربری">
    <input id="p" type="password" placeholder="رمز عبور">
    <div id="err" style="color:red;margin:10px 0"></div>
    <button class="btn btn-p" style="width:100%" onclick="doReg()">ثبت‌نام</button>
    <p style="text-align:center;margin-top:15px;color:#666">حساب دارید؟ <a onclick="page='login';render()" style="color:#2563EB;cursor:pointer">ورود</a></p>
  </div></div>`;
    }
function showAdmin(){
  const teachers=DB.all('user:teacher:'), exams=DB.all('exam:'), students=DB.all('roster:');
  let content='';
  if(page==='teachers') content=`<h2>معلمان</h2><table><tr><th>نام</th><th>نام کاربری</th></tr>${teachers.map(t=>`<tr><td>${t.fullname}</td><td>${t.username}</td></tr>`).join('')}</table>`;
  else if(page==='exams') content=`<h2>آزمون‌ها</h2><table><tr><th>عنوان</th><th>معلم</th></tr>${exams.map(e=>`<tr><td>${e.title}</td><td>${teachers.find(t=>t.username===e.teacher_id)?.fullname||'-'}</td></tr>`).join('')}</table>`;
  else content=`<div class="grid"><div class="stat-box"><div class="stat-num">${teachers.length}</div>معلم</div><div class="stat-box"><div class="stat-num">${exams.length}</div>آزمون</div><div class="stat-box"><div class="stat-num">${students.length}</div>دانش‌آموز</div></div>`;
  return `<div class="flex"><div class="sidebar">
    <h3 style="margin-bottom:20px">پنل مدیر</h3>
    <div class="${page==='dash'?'active':''}" onclick="page='dash';render()">داشبورد</div>
    <div class="${page==='teachers'?'active':''}" onclick="page='teachers';render()">معلمان</div>
    <div class="${page==='exams'?'active':''}" onclick="page='exams';render()">آزمون‌ها</div>
    <div onclick="doLogout()" style="color:#f87171;margin-top:20px">خروج</div>
  </div><div class="main"><h1 style="margin-bottom:20px">داشبورد مدیر</h1>${content}</div></div>`;
}

function showTeacher(){
  const myExams=DB.all('exam:').filter(e=>e.teacher_id===user.username);
  const myClasses=DB.all('class:').filter(c=>c.teacher_id===user.username);
  const myRoster=DB.all('roster:').filter(r=>r.teacher_id===user.username);
  let content='';
  if(page==='exams') content=`<button class="btn btn-p" onclick="newExam()">+ آزمون جدید</button><div class="grid" style="margin-top:15px">${myExams.map(e=>`<div class="card"><h3>${e.title}</h3><button class="btn btn-p" onclick="examId='${e.id}';render()">سوالات</button><button class="btn btn-d" onclick="delExam('${e.id}')">حذف</button></div>`).join('')}</div>`;
  else if(page==='classes') content=`<button class="btn btn-p" onclick="newClass()">+ کلاس جدید</button><div class="grid" style="margin-top:15px">${myClasses.map(c=>`<div class="card"><h3>${c.name}</h3><p style="color:#666">${myRoster.filter(r=>r.class_id===c.id).length} دانش‌آموز</p><button class="btn btn-p" onclick="classId='${c.id}';render()">دانش‌آموزان</button><button class="btn btn-d" onclick="delClass('${c.id}')">حذف</button></div>`).join('')}</div>`;
  else content=`<div class="grid"><div class="stat-box"><div class="stat-num">${myExams.length}</div>آزمون</div><div class="stat-box"><div class="stat-num">${myClasses.length}</div>کلاس</div><div class="stat-box"><div class="stat-num">${myRoster.length}</div>دانش‌آموز</div></div>`;
  return `<div class="flex"><div class="sidebar">
    <h3 style="margin-bottom:20px">پنل معلم</h3>
    <div class="${page==='dash'?'active':''}" onclick="page='dash';render()">داشبورد</div>
    <div class="${page==='exams'?'active':''}" onclick="page='exams';render()">آزمون‌ها</div>
    <div class="${page==='classes'?'active':''}" onclick="page='classes';render()">کلاس‌ها</div>
    <div onclick="doLogout()" style="color:#f87171;margin-top:20px">خروج</div>
  </div><div class="main"><h1 style="margin-bottom:20px">داشبورد معلم</h1>${content}</div></div>`;
    }

    function showQuestions(eid){
  const exam=DB.get('exam:'+eid), qs=DB.all('question:').filter(q=>q.exam_id===eid);
  return `<div style="padding:20px"><button class="btn btn-g" onclick="examId=null;render()">← بازگشت</button>
  <h1 style="margin:20px 0">سوالات: ${exam.title}</h1>
  <div class="flex" style="gap:20px;flex-wrap:wrap">
    <div class="card" style="flex:1;min-width:300px">
      <h3>افزودن سوال</h3>
      <textarea id="qt" rows="3" placeholder="متن سوال"></textarea>
      ${['A','B','C','D'].map((l,i)=>`<div style="display:flex;gap:8px;margin:5px 0"><div onclick="correctAns=${i};document.querySelectorAll('.ca').forEach(e=>e.style.background='white');this.style.background='#16A34A'" class="ca" style="width:24px;height:24px;border-radius:50%;border:2px solid #ccc;cursor:pointer"></div><span>${l}</span><input id="op${i}" placeholder="گزینه ${l}"></div>`).join('')}
      <input id="qm" type="number" value="1" placeholder="نمره" style="width:100px">
      <button class="btn btn-p" style="width:100%;margin-top:10px" onclick="saveQ('${eid}')">افزودن</button>
    </div>
    <div style="flex:1;min-width:300px">
      <h3>سوالات (${qs.length})</h3>
      ${qs.length===0?'<p style="color:#666">سوالی نیست</p>':qs.map((q,i)=>`<div class="card"><b>${i+1}. ${q.question_text}</b><br><small>پاسخ: ${q.correct_answer} - نمره: ${q.mark}</small><button class="btn btn-d" style="float:left" onclick="delQ('${q.id}')">حذف</button></div>`).join('')}
    </div>
  </div></div>`;
}

function showStudents(cid){
  const cls=DB.get('class:'+cid), roster=DB.all('roster:').filter(r=>r.class_id===cid);
  return `<div style="padding:20px"><button class="btn btn-g" onclick="classId=null;render()">← بازگشت</button>
  <h1 style="margin:20px 0">کلاس: ${cls.name}</h1>
  <div class="card"><h3>افزودن دانش‌آموز</h3><div style="display:flex;gap:10px"><input id="sn" placeholder="نام دانش‌آموز"><button class="btn btn-p" onclick="addSt('${cid}')">افزودن</button></div></div>
  <div class="card"><h3>دانش‌آموزان (${roster.length})</h3>
  ${roster.length===0?'<p style="color:#666">دانش‌آموزی نیست</p>':`<table><tr><th>نام</th><th>کد</th><th></th></tr>${roster.map(r=>`<tr><td><b>${r.fullname}</b></td><td style="font-family:monospace;font-size:18px;color:#2563EB">${r.code}</td><td><button class="btn btn-d" onclick="delSt('${r.id}')">حذف</button></td></tr>`).join('')}</table>`}</div></div>`;
    }

    function setRole(r){role=r;render()}

function doLogin(){
  const u=document.getElementById('u').value,p=document.getElementById('p').value;
  if(!u||!p){document.getElementById('err').textContent='نام کاربری و رمز را وارد کنید';return}
  const usr=DB.get('user:'+role+':'+u);
  if(!usr||usr.password!==p){document.getElementById('err').textContent='اشتباه است';return}
  DB.set('cu',usr);window.location.reload();
}

function doReg(){
  const n=document.getElementById('n').value,u=document.getElementById('u').value,p=document.getElementById('p').value;
  if(!n||!u||!p){document.getElementById('err').textContent='همه فیلدها را پر کنید';return}
  if(DB.get('user:'+role+':'+u)){document.getElementById('err').textContent='تکراری است';return}
  const usr={id:uid(),role,username:u,password:p,fullname:n};
  DB.set('user:'+role+':'+u,usr);DB.set('cu',usr);window.location.reload();
}

function doLogout(){DB.del('cu');window.location.reload()}

function newExam(){const t=prompt('عنوان آزمون:');if(t){DB.set('exam:'+uid(),{id:uid(),title:t,teacher_id:user.username});render()}}
function delExam(id){if(confirm('حذف؟')){DB.del('exam:'+id);DB.all('question:').filter(q=>q.exam_id===id).forEach(q=>DB.del('question:'+q.id));render()}}
function newClass(){const n=prompt('نام کلاس:');if(n){DB.set('class:'+uid(),{id:uid(),name:n,teacher_id:user.username});render()}}
function delClass(id){if(confirm('حذف؟')){DB.del('class:'+id);DB.all('roster:').filter(r=>r.class_id===id).forEach(r=>DB.del('roster:'+r.id));render()}}

function saveQ(eid){
  const t=document.getElementById('qt').value,ops=[0,1,2,3].map(i=>document.getElementById('op'+i).value),m=document.getElementById('qm').value;
  if(!t||ops.some(o=>!o)){alert('همه فیلدها را پر کنید');return}
  DB.set('question:'+uid(),{id:uid(),exam_id:eid,question_text:t,option_a:ops[0],option_b:ops[1],option_c:ops[2],option_d:ops[3],correct_answer:['A','B','C','D'][correctAns],mark:Number(m)||1});
  render();
}
function delQ(id){if(confirm('حذف؟')){DB.del('question:'+id);render()}}

function addSt(cid){
  const n=document.getElementById('sn').value;
  if(!n){alert('نام را وارد کنید');return}
  const codes=DB.all('roster:').map(r=>r.code);
  DB.set('roster:'+uid(),{id:uid(),class_id:cid,teacher_id:user.username,fullname:n,code:genCode(codes)});
  render();
}
function delSt(id){if(confirm('حذف؟')){DB.del('roster:'+id);render()}}

render();
</script>
</body>
</html>

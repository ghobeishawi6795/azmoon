<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سامانه مدیریت مدرسه</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #F0F4F8;
            min-height: 100vh;
            padding: 15px;
        }
        #root {
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 16px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #E8EDF2;
        }
        .header h1 {
            font-size: 20px;
            color: #1A2A3A;
        }
        .header .user {
            font-size: 13px;
            color: #6B7A8A;
        }
        .header .user span {
            color: #2563EB;
            font-weight: 700;
        }
        .logo {
            font-size: 28px;
            margin-bottom: 6px;
        }
        h2 {
            font-size: 17px;
            color: #1A2A3A;
            margin-bottom: 10px;
        }
        .flex {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 600px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #3A4A5A;
            margin-bottom: 3px;
        }
        input,
        select,
        textarea {
            width: 100%;
            padding: 9px 12px;
            border-radius: 8px;
            border: 1.5px solid #DCE3EA;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            background: white;
            transition: border-color 0.2s;
            margin-bottom: 10px;
        }
        input:focus,
        select:focus,
        textarea:focus {
            border-color: #2563EB;
        }
        textarea {
            min-height: 50px;
            resize: vertical;
        }
        button {
            padding: 9px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            background: #2563EB;
            color: white;
        }
        button:active {
            transform: scale(0.96);
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 11px;
        }
        .btn-ghost {
            background: #F0F4F8;
            color: #3A4A5A;
        }
        .btn-danger {
            background: #FEE2E2;
            color: #DC2626;
        }
        .btn-success {
            background: #16A34A;
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #2563EB;
            color: #2563EB;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
        }
        .badge-blue {
            background: #DBEAFE;
            color: #2563EB;
        }
        .badge-green {
            background: #D1FAE5;
            color: #16A34A;
        }
        .badge-orange {
            background: #FEF3C7;
            color: #D97706;
        }
        .badge-red {
            background: #FEE2E2;
            color: #DC2626;
        }
        .badge-gray {
            background: #F3F4F6;
            color: #6B7280;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #F0F4F8;
            flex-wrap: wrap;
            gap: 6px;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-item .title {
            font-weight: 600;
            color: #1A2A3A;
            font-size: 14px;
        }
        .list-item .sub {
            font-size: 11px;
            color: #6B7A8A;
        }
        .mt-10 {
            margin-top: 10px;
        }
        .mb-10 {
            margin-bottom: 10px;
        }
        .text-center {
            text-align: center;
        }
        .text-muted {
            color: #6B7A8A;
            font-size: 13px;
        }
        .empty {
            text-align: center;
            padding: 25px 0;
            color: #9AA8B8;
            font-size: 13px;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 100;
        }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 450px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .modal-header h2 {
            margin: 0;
            font-size: 17px;
        }
        .modal-close {
            cursor: pointer;
            font-size: 20px;
            color: #9AA8B8;
            background: none;
            border: none;
            padding: 0 6px;
        }
        .stat-box {
            background: #F8FAFC;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box .num {
            font-size: 22px;
            font-weight: 900;
            color: #1A2A3A;
        }
        .stat-box .label {
            font-size: 10px;
            color: #6B7A8A;
        }
        .hidden {
            display: none !important;
        }
        .w-full {
            width: 100%;
        }
        .gap-8 {
            gap: 8px;
        }
        .mt-16 {
            margin-top: 16px;
        }
        .border-top {
            border-top: 1px solid #E8EDF2;
            padding-top: 14px;
        }
        .code-display {
            font-family: monospace;
            font-size: 18px;
            font-weight: 900;
            color: #2563EB;
            letter-spacing: 2px;
            background: #F0F4F8;
            padding: 2px 10px;
            border-radius: 6px;
            display: inline-block;
        }
        .tab-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            border-bottom: 2px solid #E8EDF2;
            padding-bottom: 8px;
        }
        .tab-bar button {
            background: transparent;
            color: #6B7A8A;
            padding: 6px 14px;
            font-size: 12px;
            border-radius: 8px 8px 0 0;
            border-bottom: 2px solid transparent;
            margin-bottom: -9px;
        }
        .tab-bar button.active {
            color: #2563EB;
            border-bottom-color: #2563EB;
            background: #EFF6FF;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        'use strict';

        // ============================================================
        //  React مینیاتوری (آفلاین)
        // ============================================================

        const React = {
            createElement: function(type, props, ...children) {
                if (typeof type === 'function') return type(props || {});
                const el = document.createElement(type);
                if (props) {
                    for (const k in props) {
                        if (k === 'className') el.className = props[k];
                        else if (k === 'style' && typeof props[k] === 'object') Object.assign(el.style, props[k]);
                        else if (k.startsWith('on') && typeof props[k] === 'function') {
                            el.addEventListener(k.substring(2).toLowerCase(), props[k]);
                        } else if (k === 'dangerouslySetInnerHTML') el.innerHTML = props[k].__html;
                        else if (['value', 'type', 'placeholder', 'disabled', 'rows', 'min', 'max', 'step', 'checked']
                            .includes(k)) el[k] = props[k];
                        else el.setAttribute(k, props[k]);
                    }
                }
                for (const c of children) {
                    if (c === null || c === undefined || c === false) continue;
                    if (typeof c === 'string' || typeof c === 'number') el.appendChild(document.createTextNode(String(
                    c)));
                    else if (c instanceof Node) el.appendChild(c);
                    else if (Array.isArray(c)) { for (const sc of c) { if (sc instanceof Node) el.appendChild(sc); } }
                }
                return el;
            },
            useState: function(init) {
                const state = { value: typeof init === 'function' ? init() : init, listeners: [] };
                const set = function(nv) {
                    const next = typeof nv === 'function' ? nv(state.value) : nv;
                    if (next !== state.value) { state.value = next;
                        state.listeners.forEach(l => l()); }
                };
                const get = function() { return state.value; };
                const r = [get, set];
                r._addListener = function(l) { state.listeners.push(l); };
                return r;
            },
            useEffect: function(effect, deps) { effect(); },
            useCallback: function(fn, deps) { return fn; },
            useRef: function(init) { return { current: init }; }
        };

        const ReactDOM = {
            createRoot: function(c) {
                return { render: function(el) { c.innerHTML = '';
                        if (el instanceof Node) c.appendChild(el); } };
            }
        };

        // ============================================================
        //  ابزارهای کمکی
        // ============================================================

        const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

        function getJSON(k) { try { const d = localStorage.getItem(k); return d ? JSON.parse(d) : null; } catch { return null; } }

        function setJSON(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch { return false; } }

        function deleteKey(k) { try { localStorage.removeItem(k); return true; } catch { return false; } }

        function listPrefix(p) { try { return Object.keys(localStorage).filter(k => k.startsWith(p)); } catch { return []; } }

        function loadAll(p) { return listPrefix(p).map(k => getJSON(k)).filter(Boolean); }

        function generateCode(existing) { let c; do { c = String(Math.floor(100000 + Math.random() * 900000)); } while (existing
                .includes(c)); return c; }

        function shuffleArray(a) { const arr = [...a]; for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math
                    .random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

        function awardedMarkOf(a) { if (a.awarded_mark != null) return a.awarded_mark; return a.is_correct ? a.mark : 0; }

        function downloadTextFile(fn, content, mime) {
            const blob = new Blob([content], { type: mime });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fn;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ============================================================
        //  کامپوننت‌های UI
        // ============================================================

        function Field({ label, children }) {
            return React.createElement('div', { className: 'field' },
                React.createElement('label', null, label),
                children
            );
        }

        function Button({ children, variant = 'primary', style, onClick, disabled, className = '' }) {
            const v = {
                primary: { background: '#2563EB', color: '#fff' },
                ghost: { background: '#F0F4F8', color: '#3A4A5A' },
                danger: { background: '#FEE2E2', color: '#DC2626' },
                success: { background: '#16A34A', color: '#fff' },
                outline: { background: 'transparent', color: '#2563EB', border: '1.5px solid #2563EB' },
            };
            const base = { padding: '9px 16px', borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: 'pointer',
                fontFamily: 'inherit', border: 'none', transition: 'all 0.1s', ...v[variant], ...style };
            return React.createElement('button', { style: base, onClick, disabled, className }, children);
        }

        function TextInput({ value, onChange, placeholder, type = 'text', style = {}, ...props }) {
            return React.createElement('input', {
                type,
                value,
                onChange: e => onChange(e.target.value),
                placeholder,
                style: { width: '100%', padding: '9px 12px', borderRadius: 8, border: '1.5px solid #DCE3EA',
                    fontSize: 13, outline: 'none', fontFamily: 'inherit', background: '#fff',
                    color: '#1A2A3A', ...style },
                ...props
            });
        }

        function Badge({ children, tone = 'blue' }) {
            const t = { blue: 'badge-blue', green: 'badge-green', orange: 'badge-orange', red: 'badge-red',
                gray: 'badge-gray' };
            return React.createElement('span', { className: 'badge ' + (t[tone] || 'badge-gray') }, children);
        }

        function Modal({ title, children, onClose }) {
            return React.createElement('div', { className: 'modal-overlay' },
                React.createElement('div', { className: 'modal' },
                    React.createElement('div', { className: 'modal-header' },
                        React.createElement('h2', null, title),
                        React.createElement('button', { className: 'modal-close', onClick: onClose }, '✕')
                    ),
                    children
                )
            );
        }

        function EmptyState({ text }) {
            return React.createElement('div', { className: 'empty' }, text);
        }

        function StatBox({ num, label }) {
            return React.createElement('div', { className: 'stat-box' },
                React.createElement('div', { className: 'num' }, num),
                React.createElement('div', { className: 'label' }, label)
            );
        }

        function TabBar({ tabs, active, onChange }) {
            return React.createElement('div', { className: 'tab-bar' },
                tabs.map(t =>
                    React.createElement('button', {
                        key: t.key,
                        className: active === t.key ? 'active' : '',
                        onClick: () => onChange(t.key)
                    }, t.label)
                )
            );
        }

        // ============================================================
        //  صفحه ورود
        // ============================================================

        function LoginScreen({ onLogin, onRegister }) {
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [showPw, setShowPw] = React.useState(false);

            const submit = () => {
                setError('');
                if (!username || !password) { setError('لطفاً نام کاربری و رمز عبور را وارد کنید.'); return; }
                setLoading(true);
                const teacher = getJSON(`teacher:${username}`);
                setTimeout(() => {
                    setLoading(false);
                    if (!teacher || teacher.password !== password) {
                        setError('نام کاربری یا رمز عبور اشتباه است.');
                        return;
                    }
                    onLogin(teacher);
                }, 300);
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'logo' }, '🏫'),
                React.createElement('h1', { style: { fontSize: 20, color: '#1A2A3A', marginBottom: 2 } },
                    'سامانه مدیریت مدرسه'),
                React.createElement('div', { className: 'text-muted', style: { marginBottom: 18 } },
                    'ورود به پنل مدیریت'),

                React.createElement(Field, { label: 'نام کاربری' },
                    React.createElement(TextInput, { value: username, onChange: setUsername,
                        placeholder: 'نام کاربری خود را وارد کنید', onKeyDown: e => e.key === 'Enter' &&
                            submit() })
                ),
                React.createElement(Field, { label: 'رمز عبور' },
                    React.createElement('div', { style: { position: 'relative' } },
                        React.createElement(TextInput, {
                            type: showPw ? 'text' : 'password',
                            value: password,
                            onChange: setPassword,
                            placeholder: 'رمز عبور خود را وارد کنید',
                            onKeyDown: e => e.key === 'Enter' && submit()
                        }),
                        React.createElement('span', {
                            style: { position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)',
                                cursor: 'pointer', fontSize: 16 },
                            onClick: () => setShowPw(!showPw)
                        }, showPw ? '🙈' : '👁️')
                    )
                ),

                error && React.createElement('div', { style: { color: '#DC2626', fontSize: 13, margin: '6px 0' } },
                    error),

                React.createElement(Button, { onClick: submit, disabled: loading, style: { width: '100%',
                        padding: '11px 0' } },
                    loading ? 'در حال ورود...' : 'ورود به سامانه'
                ),

                React.createElement('div', { style: { textAlign: 'center', marginTop: 12, fontSize: 13,
                        color: '#6B7A8A' } },
                    'حساب کاربری ندارید؟ ',
                    React.createElement('span', {
                        style: { color: '#2563EB', fontWeight: 700, cursor: 'pointer' },
                        onClick: onRegister
                    }, 'ثبت‌نام مدیر')
                )
            );
        }

        // ============================================================
        //  صفحه ثبت‌نام مدیر
        // ============================================================

        function RegisterScreen({ onRegistered, goLogin }) {
            const [fullname, setFullname] = React.useState('');
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [email, setEmail] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const submit = () => {
                setError('');
                if (!fullname || !username || !password || !email) {
                    setError('همه فیلدها را پر کنید.');
                    return;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    setError('ایمیل معتبر نیست.');
                    return;
                }
                if (password.length < 4) {
                    setError('رمز عبور باید حداقل ۴ کاراکتر باشد.');
                    return;
                }
                setLoading(true);
                if (getJSON(`teacher:${username}`)) {
                    setLoading(false);
                    setError('این نام کاربری قبلاً ثبت شده است.');
                    return;
                }
                const teacher = {
                    username,
                    password,
                    fullname,
                    email,
                    role: 'admin',
                    created_at: new Date().toISOString()
                };
                setJSON(`teacher:${username}`, teacher);
                setLoading(false);
                onRegistered(teacher);
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'logo' }, '📝'),
                React.createElement('h1', { style: { fontSize: 19, color: '#1A2A3A' } }, 'ثبت‌نام مدیر سامانه'),
                React.createElement('div', { className: 'text-muted', style: { marginBottom: 14 } },
                    'فقط یک‌بار برای راه‌اندازی سامانه'),

                React.createElement(Field, { label: 'نام و نام‌خانوادگی' },
                    React.createElement(TextInput, { value: fullname, onChange: setFullname,
                        placeholder: 'مثلاً: علی محمدی' })
                ),
                React.createElement(Field, { label: 'نام کاربری' },
                    React.createElement(TextInput, { value: username, onChange: setUsername,
                        placeholder: 'یک نام کاربری یکتا انتخاب کنید' })
                ),
                React.createElement(Field, { label: 'رمز عبور' },
                    React.createElement(TextInput, { type: 'password', value: password, onChange: setPassword,
                        placeholder: 'حداقل ۴ کاراکتر' })
                ),
                React.createElement(Field, { label: 'ایمیل' },
                    React.createElement(TextInput, { type: 'email', value: email, onChange: setEmail,
                        placeholder: 'برای بازیابی رمز عبور' })
                ),

                error && React.createElement('div', { style: { color: '#DC2626', fontSize: 13, margin: '6px 0' } },
                    error),

                React.createElement(Button, { onClick: submit, disabled: loading, style: { width: '100%',
                        padding: '11px 0' } },
                    loading ? 'در حال ثبت...' : 'ثبت‌نام مدیر'
                ),

                React.createElement('div', { style: { textAlign: 'center', marginTop: 12, fontSize: 13,
                        color: '#6B7A8A' } },
                    'قبلاً ثبت‌نام کردید؟ ',
                    React.createElement('span', {
                        style: { color: '#2563EB', fontWeight: 700, cursor: 'pointer' },
                        onClick: goLogin
                    }, 'ورود به سامانه')
                )
            );
        }

        // ============================================================
        //  داشبورد ادمین
        // ============================================================

        function AdminDashboard({ teacher, onNavigate, refresh }) {
            const teachers = loadAll('teacher:').filter(t => t.username !== teacher.username);
            const exams = loadAll('exam:');
            const classes = loadAll('class:');
            const students = loadAll('student:');
            const questions = loadAll('question:');

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'header' },
                    React.createElement('h1', null, '📊 داشبورد مدیریت'),
                    React.createElement('div', { className: 'user' },
                        teacher.fullname,
                        React.createElement('span', { style: { margin: '0 6px' } }, '|'),
                        React.createElement('span', { style: { cursor: 'pointer', color: '#DC2626' },
                            onClick: () => { localStorage.clear();
                                location.reload(); } }, '🚪 خروج')
                    )
                ),

                React.createElement('div', { className: 'grid-3' },
                    React.createElement(StatBox, { num: teachers.length, label: 'معلمان' }),
                    React.createElement(StatBox, { num: exams.length, label: 'آزمون‌ها' }),
                    React.createElement(StatBox, { num: questions.length, label: 'سوالات' }),
                    React.createElement(StatBox, { num: classes.length, label: 'کلاس‌ها' }),
                    React.createElement(StatBox, { num: students.length, label: 'دانش‌آموزان' })
                ),

                React.createElement('div', { className: 'flex', style: { marginBottom: 12 } },
                    React.createElement(Button, { onClick: () => onNavigate('teachers') }, '👨‍🏫 معلمان'),
                    React.createElement(Button, { variant: 'ghost', onClick: () => onNavigate('all-exams') },
                        '📝 آزمون‌ها'),
                    React.createElement(Button, { variant: 'ghost', onClick: () => onNavigate('all-results') },
                        '📊 نتایج')
                ),

                React.createElement('div', { className: 'border-top' },
                    React.createElement('h2', null, '👨‍🏫 لیست معلمان'),
                    teachers.length === 0 ?
                    React.createElement(EmptyState, { text: 'هنوز معلمی به سامانه اضافه نشده است.' }) :
                    teachers.map(t =>
                        React.createElement('div', { className: 'list-item', key: t.username },
                            React.createElement('div', null,
                                React.createElement('div', { className: 'title' }, t.fullname),
                                React.createElement('div', { className: 'sub' },
                                    '👤 ' + t.username + ' · 📧 ' + t.email)
                            ),
                            React.createElement(Badge, { tone: 'blue' }, 'معلم')

        function QuestionsScreen({ exam, onBack, refresh }) {
            const [text, setText] = React.useState('');
            const [mark, setMark] = React.useState(1);
            const [type, setType] = React.useState('mc');
            const [options, setOptions] = React.useState(['', '', '', '']);
            const [correct, setCorrect] = React.useState(0);
            const [modelAnswer, setModelAnswer] = React.useState('');
            const [keywords, setKeywords] = React.useState('');
            const [saving, setSaving] = React.useState(false);
            const [editingId, setEditingId] = React.useState(null);
            const [showBulk, setShowBulk] = React.useState(false);
            const [bulkText, setBulkText] = React.useState('');

            const questions = loadAll('question:').filter(q => q.exam_id === exam.id);

            const resetForm = () => {
                setText('');
                setMark(1);
                setType('mc');
                setOptions(['', '', '', '']);
                setCorrect(0);
                setModelAnswer('');
                setKeywords('');
                setEditingId(null);
            };

            const startEdit = (q) => {
                setEditingId(q.id);
                setText(q.question_text);
                setMark(q.mark || 1);
                setType(q.type || 'mc');
                if (q.type === 'mc') {
                    setOptions([q.option_a || '', q.option_b || '', q.option_c || '', q.option_d || '']);
                    setCorrect(['A', 'B', 'C', 'D'].indexOf(q.correct_answer) || 0);
                } else {
                    setModelAnswer(q.model_answer || '');
                    setKeywords((q.keywords || []).join(', '));
                }
            };

            const saveQuestion = () => {
                if (!text.trim()) return;
                if (type === 'mc' && options.some(o => !o.trim())) {
                    alert('همه گزینه‌ها را پر کنید.');
                    return;
                }
                setSaving(true);
                const id = editingId || uid();
                const payload = {
                    id,
                    exam_id: exam.id,
                    question_text: text.trim(),
                    mark: Number(mark) || 1,
                    type: type,
                    created_at: new Date().toISOString()
                };
                if (type === 'mc') {
                    payload.option_a = options[0];
                    payload.option_b = options[1];
                    payload.option_c = options[2];
                    payload.option_d = options[3];
                    payload.correct_answer = ['A', 'B', 'C', 'D'][correct];
                } else {
                    payload.model_answer = modelAnswer.trim() || null;
                    payload.keywords = keywords.split(',').map(k => k.trim()).filter(Boolean);
                }
                setJSON(`question:${id}`, payload);
                setSaving(false);
                resetForm();
                refresh();
            };

            const removeQuestion = (id) => {
                if (!confirm('این سوال حذف شود؟')) return;
                deleteKey(`question:${id}`);
                if (editingId === id) resetForm();
                refresh();
            };

            const parseBulk = (text) => {
                const blocks = text.split(/\n\s*(?:---)?\s*\n/).map(b => b.trim()).filter(Boolean);
                const parsed = [];
                blocks.forEach((block, idx) => {
                    const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
                    const qLine = lines.find(l => /^Q:/i.test(l));
                    if (!qLine) return;
                    const typeLine = lines.find(l => /^TYPE:/i.test(l));
                    const isEssay = typeLine && /essay|تشریحی/i.test(typeLine.replace(/^TYPE:/i, '').trim());
                    const markLine = lines.find(l => /^MARK:/i.test(l));
                    if (isEssay) {
                        const answerLine = lines.find(l => /^ANSWER:/i.test(l));
                        parsed.push({
                            type: 'essay',
                            question_text: qLine.replace(/^Q:/i, '').trim(),
                            model_answer: answerLine ? answerLine.replace(/^ANSWER:/i, '').trim() : '',
                            mark: markLine ? Number(markLine.replace(/^MARK:/i, '').trim()) || 1 : 1
                        });
                    } else {
                        const optA = lines.find(l => /^A\)/i.test(l));
                        const optB = lines.find(l => /^B\)/i.test(l));
                        const optC = lines.find(l => /^C\)/i.test(l));
                        const optD = lines.find(l => /^D\)/i.test(l));
                        const ansLine = lines.find(l => /^ANSWER:/i.test(l));
                        if (!optA || !optB || !optC || !optD || !ansLine) return;
                        const answers = ansLine.replace(/^ANSWER:/i, '').trim().toUpperCase().split(/[,\s]+/)
                            .filter(Boolean);
                        parsed.push({
                            type: 'mc',
                            question_text: qLine.replace(/^Q:/i, '').trim(),
                            option_a: optA.replace(/^A\)/i, '').trim(),
                            option_b: optB.replace(/^B\)/i, '').trim(),
                            option_c: optC.replace(/^C\)/i, '').trim(),
                            option_d: optD.replace(/^D\)/i, '').trim(),
                            correct_answer: answers.length === 1 ? answers[0] : 'A',
                            mark: markLine ? Number(markLine.replace(/^MARK:/i, '').trim()) || 1 : 1
                        });
                    }
                });
                return parsed;
            };

            const runBulkImport = () => {
                const parsed = parseBulk(bulkText);
                if (parsed.length === 0) { alert('سوال معتبری پیدا نشد.'); return; }
                parsed.forEach(p => {
                    const id = uid();
                    setJSON(`question:${id}`, { ...p, id, exam_id: exam.id, created_at: new Date()
                            .toISOString() });
                });
                setBulkText('');
                setShowBulk(false);
                refresh();
            };

            const letters = ['A', 'B', 'C', 'D'];

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'header' },
                    React.createElement('h1', null, '❓ ' + exam.title),
                    React.createElement('div', { className: 'flex' },
                        React.createElement(Button, { variant: 'ghost', className: 'btn-sm',
                            onClick: () => setShowBulk(!showBulk) }, '📥 وارد کردن دسته‌ای'),
                        React.createElement(Button, { variant: 'ghost', onClick: onBack }, '🔙 بازگشت')
                    )
                ),

                showBulk &&
                React.createElement('div', { style: { background: '#F8FAFC', padding: 12, borderRadius: 8,
                        marginBottom: 12 } },
                    React.createElement('div', { className: 'text-muted', style: { fontSize: 11,
                            marginBottom: 6 } },
                        'فرمت: Q: متن سوال، A) گزینه، B) گزینه، ...، ANSWER: پاسخ صحیح، MARK: نمره'
                    ),
                    React.createElement(TextInput, {
                        value: bulkText,

                        style: { minHeight: 80 }
                    }),
                    React.createElement('div', { className: 'flex', style: { marginTop: 6 } },
                        React.createElement(Button, { className: 'btn-sm', onClick: runBulkImport },
                            'افزودن سوالات'),
                        React.createElement(Button, { className: 'btn-sm', variant: 'ghost',
                            onClick: () => { setShowBulk(false);
                                setBulkText(''); } }, 'لغو')
                    )
                ),

                React.createElement('div', { style: { background: '#F8FAFC', padding: 14, borderRadius: 8,
                        marginBottom: 14 } },
                    React.createElement('div', { className: 'grid-2' },
                        React.createElement(Field, { label: 'متن سوال' },
                            React.createElement(TextInput, { value: text, onChange: setText,
                                placeholder: 'متن سوال را وارد کنید' })
                        ),
                        React.createElement(Field, { label: 'نمره' },

                        class_id: classroom.id,
                        teacher_id: teacher.username,

                        created_at: new Date().toISOString()

            };

            const getStudentStats = (studentId) => {
                const studentAnswers = answers.filter(a => a.student_id === studentId);
                const examIds = [...new Set(studentAnswers.map(a => a.exam_id))];
                let total = 0,
                    got = 0;
                studentAnswers.forEach(a => { total += a.mark || 1;
                    got += awardedMarkOf(a); });
                const avg = total ? Math.round((got / total) * 100) : 0;
                return { examCount: examIds.length, avg };
            };

        function ResultsScreen({ teacher, onBack, refresh }) {
            const [examId, setExamId] = React.useState(null);
            const exams = loadAll('exam:').filter(e => e.teacher_id === teacher.username);
            const questions = loadAll('question:');
            const answers = loadAll('answer:');
            const roster = loadAll('roster:').filter(r => r.teacher_id === teacher.username);

            const exam = exams.find(e => e.id === examId);
            const examQuestions = exam ? questions.filter(q => q.exam_id === exam.id) : [];
            const examAnswers = exam ? answers.filter(a => a.exam_id === exam.id) : [];

            const byStudent = {};
            examAnswers.forEach(a => {
                byStudent[a.student_id] = byStudent[a.student_id] || [];
                byStudent[a.student_id].push(a);
            });

            const rows = Object.entries(byStudent).map(([sid, list]) => {
                const student = roster.find(r => r.id === sid);
                const total = list.reduce((s, a) => s + (a.mark || 1), 0);
                const got = list.reduce((s, a) => s + awardedMarkOf(a), 0);
                const pct = total ? Math.round((got / total) * 100) : 0;
                const correctCount = list.filter(a => a.is_correct).length;
                return {
                    name: student ? student.fullname : '—',
                    code: student ? student.code : '—',
                    pct,
                    correctCount,
                    total: list.length,
                    answers: list
                };
            }).sort((a, b) => b.pct - a.pct);

            const avg = rows.length ? Math.round(rows.reduce((s, r) => s + r.pct, 0) / rows.length) : 0;

            const exportCSV = () => {
                if (rows.length === 0) { alert('هیچ داده‌ای برای خروجی وجود ندارد.'); return; }
                const header = ['رتبه', 'نام', 'کد', 'نمره', 'پاسخ صحیح', 'تعداد سوالات'];
                const lines = [header.join(',')];
                rows.forEach((r, i) => {
                    lines.push([i + 1, r.name, r.code, r.pct + '%', r.correctCount + '/' + r.total, r.total]
                        .join(','));
                });
                downloadTextFile(exam.title + '-نتایج.csv', '\uFEFF' + lines.join('\n'), 'text/csv;charset=utf-8;');
            };

            // تصحیح تشریحی
            const [essayGrades, setEssayGrades] = React.useState({});
            const essayAnswers = examAnswers.filter(a => {
                const q = questions.find(q => q.id === a.question_id);
                return q && q.type === 'essay' && a.selected_option;
            });

            const saveEssayGrade = (answerId, mark, maxMark) => {
                const val = Math.min(Math.max(Number(mark) || 0, 0), maxMark);
                const current = getJSON(`answer:${answerId}`);
                if (current) {
                    setJSON(`answer:${answerId}`, { ...current, awarded_mark: val, is_correct: val >= maxMark });
                    refresh();
                }
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'header' },
                    React.createElement('h1', null, '📊 نتایج'),
                    React.createElement(Button, { variant: 'ghost', onClick: onBack }, '🔙 بازگشت')
                ),

                React.createElement(Field, { label: 'انتخاب آزمون' },
                    React.createElement('select', { value: examId || '', onChange: e => setExamId(e.target.value) },
                        React.createElement('option', { value: '' }, '— انتخاب کنید —'),
                        exams.map(e =>
                            React.createElement('option', { key: e.id, value: e.id }, e.title)
                        )
                    )
                ),

                exam && React.createElement(React.Fragment, null,
                    React.createElement('div', { className: 'grid-3' },
                        React.createElement(StatBox, { num: rows.length, label: 'شرکت‌کنندگان' }),
                        React.createElement(StatBox, { num: avg + '%', label: 'میانگین نمرات' }),
                        React.createElement(StatBox, { num: examQuestions.length, label: 'تعداد سوالات' })
                    ),

                    rows.length === 0 ?
                    React.createElement(EmptyState, { text: 'هنوز کسی در این آزمون شرکت نکرده است.' }) :
                    React.createElement(React.Fragment, null,
                        React.createElement('div', { className: 'flex', style: { marginBottom: 10 } },
                            React.createElement(Button, { className: 'btn-sm', variant: 'ghost',
                                onClick: exportCSV }, '📥 خروجی CSV')
                        ),
                        rows.map((r, i) =>
                            React.createElement('div', { className: 'list-item', key: i },
                                React.createElement('div', null,
                                    React.createElement('div', { className: 'title' },
                                        `${i+1}. ${r.name}`,
                                        React.createElement(Badge, {
                                            tone: r.pct >= 70 ? 'green' : r.pct >= 50 ? 'orange' :
                                            'red',
                                            style: { marginRight: 8 }
                                        }, r.pct + '%')
                                    ),
                                    React.createElement('div', { className: 'sub' },
                                        'کد: ' + r.code,
                                        ` · ${r.correctCount} پاسخ صحیح از ${r.total}`
                                    )
                                )
                            )
                        )
                    ),

                    essayAnswers.length > 0 &&
                    React.createElement('div', { className: 'border-top' },
                        React.createElement('h2', null, '📝 تصحیح تشریحی'),
                        essayAnswers.map(a => {
                            const q = questions.find(q => q.id === a.question_id);
                            const student = roster.find(r => r.id === a.student_id);
                            const grade = essayGrades[a.id] || a.awarded_mark || '';
                            return React.createElement('div', { className: 'list-item', key: a.id },
                                React.createElement('div', null,
                                    React.createElement('div', { className: 'title' }, student ?
                                        student.fullname : '—'),
                                    React.createElement('div', { className: 'sub' },
                                        q ? q.question_text : '—',
                                        React.createElement('br', null),
                                        React.createElement('span', { style: { color: '#6B7A8A',
                                                fontSize: 11 } }, a.selected_option)
                                    )
                                ),
                                React.createElement('div', { className: 'flex' },
                                    React.createElement('input', {
                                        type: 'number',
                                        min: 0,
                                        max: q ? q.mark : 1,
                                        value: grade,
                                        onChange: e => setEssayGrades({ ...essayGrades,
                                            [a.id]: e.target.value }),
                                        style: { width: 60, padding: '4px 8px',
                                            borderRadius: 6, border: '1.5px solid #DCE3EA',
                                            fontSize: 13 }
                                    }),
                                    React.createElement(Button, {
                                        className: 'btn-sm',
                                        onClick: () => saveEssayGrade(a.id, grade, q ? q
                                            .mark : 1)
                                    }, 'ثبت')
                                )
                            );
                        })
                    )
                )
            );
        }

        // ============================================================
        //  پیام‌ها (معلم)
        // ============================================================

        function MessagesScreen({ teacher, onBack, refresh }) {
            const [text, setText] = React.useState('');
            const [target, setTarget] = React.useState('all');
            const [classId, setClassId] = React.useState('');
            const [studentId, setStudentId] = React.useState('');
            const [sending, setSending] = React.useState(false);

            const classes = loadAll('class:').filter(c => c.teacher_id === teacher.username);
            const roster = loadAll('roster:').filter(r => r.teacher_id === teacher.username);
            const messages = loadAll('message:').filter(m => m.teacher_id === teacher.username)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const getTargetName = (m) => {
                if (m.target === 'all') return 'همه دانش‌آموزان';
                if (m.target === 'class') {
                    const c = classes.find(c => c.id === m.target_id);
                    return 'کلاس: ' + (c ? c.name : 'حذف‌شده');
                }
                const s = roster.find(r => r.id === m.target_id);
                return 'دانش‌آموز: ' + (s ? s.fullname : 'حذف‌شده');
            };

            const sendMessage = () => {
                if (!text.trim()) return;
                if (target === 'class' && !classId) { alert('لطفاً یک کلاس انتخاب کنید.'); return; }
                if (target === 'student' && !studentId) { alert('لطفاً یک دانش‌آموز انتخاب کنید.'); return; }
                setSending(true);
                const id = uid();
                setJSON(`message:${id}`, {
                    id,
                    teacher_id: teacher.username,
                    target: target,
                    target_id: target === 'all' ? null : target === 'class' ? classId : studentId,
                    text: text.trim(),
                    created_at: new Date().toISOString()
                });
                setSending(false);
                setText('');
                refresh();
                alert('پیام با موفقیت ارسال شد.');
            };

            const removeMessage = (id) => {
                if (!confirm('این پیام حذف شود؟')) return;
                deleteKey(`message:${id}`);
                refresh();
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'header' },
                    React.createElement('h1', null, '💬 پیام‌ها'),
                    React.createElement(Button, { variant: 'ghost', onClick: onBack }, '🔙 بازگشت')
                ),

                React.createElement('div', { style: { background: '#F8FAFC', padding: 14, borderRadius: 8,
                        marginBottom: 14 } },
                    React.createElement(Field, { label: 'گیرنده' },
                        React.createElement('div', { className: 'flex' },
                            [
                                { key: 'all', label: 'همه دانش‌آموزان' },
                                { key: 'class', label: 'یک کلاس' },
                                { key: 'student', label: 'یک دانش‌آموز' }
                            ].map(t =>
                                React.createElement(Button, {
                                    key: t.key,
                                    variant: target === t.key ? 'primary' : 'ghost',
                                    className: 'btn-sm',
                                    onClick: () => setTarget(t.key)
                                }, t.label)
                            )
                        )
                    ),
                    target === 'class' &&
                    React.createElement(Field, { label: 'انتخاب کلاس' },
                        React.createElement('select', { value: classId, onChange: e => setClassId(e.target
                                .value) },
                            React.createElement('option', { value: '' }, '— انتخاب کنید —'),
                            classes.map(c =>
                                React.createElement('option', { key: c.id, value: c.id }, c.name)
                            )
                        )
                    ),
                    target === 'student' &&
                    React.createElement(Field, { label: 'انتخاب دانش‌آموز' },
                        React.createElement('select', { value: studentId, onChange: e => setStudentId(e.target
                                .value) },
                            React.createElement('option', { value: '' }, '— انتخاب کنید —'),
                            roster.map(s =>
                                React.createElement('option', { key: s.id, value: s.id }, s.fullname +
                                    ' (' + (classes.find(c => c.id === s.class_id)?.name || '—') +
                                    ')')
                            )
                        )
                    ),
                    React.createElement(Field, { label: 'متن پیام' },
                        React.createElement(TextInput, {
                            value: text,
                            onChange: setText,
                            placeholder: 'متن پیام را وارد کنید...',
                            style: { minHeight: 50 }
                        })
                    ),
                    React.createElement(Button, { onClick: sendMessage, disabled: sending },
                        sending ? 'در حال ارسال...' : '📤 ارسال پیام'
                    )
                ),

                messages.length === 0 ?
                React.createElement(EmptyState, { text: 'هنوز پیامی ارسال نشده است.' }) :
                messages.map(m =>
                    React.createElement('div', { className: 'list-item', key: m.id },
                        React.createElement('div', null,
                            React.createElement('div', { className: 'title' }, m.text),
                            React.createElement('div', { className: 'sub' },
                                getTargetName(m),
                                ` · ${new Date(m.created_at).toLocaleString('fa-IR')}`
                            )
                        ),
                        React.createElement(Button, {
                            className: 'btn-sm',
                            variant: 'danger',
                            onClick: () => removeMessage(m.id)
                        }, '🗑️')
                    )
                )
            );
        }

        // ============================================================
        //  پرتال دانش‌آموز
        // ============================================================

        function StudentPortal() {
            const [code, setCode] = React.useState('');
            const [student, setStudent] = React.useState(null);
            const [error, setError] = React.useState('');

            const lookup = () => {
                if (!code.trim()) { setError('کد را وارد کنید.'); return; }
                const found = loadAll('roster:').find(r => r.code === code.trim());
                if (!found) { setError('کد پیدا نشد.'); return; }
                setStudent(found);
                setError('');
            };

            if (student) {
                const answers = loadAll('answer:');
                const exams = loadAll('exam:');
                const messages = loadAll('message:').filter(m =>
                    m.target === 'all' ||
                    (m.target === 'class' && m.target_id === student.class_id) ||
                    (m.target === 'student' && m.target_id === student.id)
                );
                const studentAnswers = answers.filter(a => a.student_id === student.id);
                const byExam = {};
                studentAnswers.forEach(a => {
                    byExam[a.exam_id] = byExam[a.exam_id] || [];
                    byExam[a.exam_id].push(a);
                });
                const results = Object.entries(byExam).map(([examId, list]) => {
                    const exam = exams.find(e => e.id === examId);
                    const total = list.reduce((s, a) => s + (a.mark || 1), 0);
                    const got = list.reduce((s, a) => s + awardedMarkOf(a), 0);
                    const pct = total ? Math.round((got / total) * 100) : 0;
                    return { title: exam ? exam.title : '—', pct, count: list.length, date: list[0]?.answered_at ?
                            new Date(list[0].answered_at).toLocaleDateString('fa-IR') : '—' };
                }).sort((a, b) => b.pct - a.pct);

                return React.createElement('div', { className: 'card' },
                    React.createElement('div', { className: 'header' },
                        React.createElement('h1', null, '👋 ' + student.fullname),
                        React.createElement(Button, { variant: 'ghost', onClick: () => setStudent(null) },
                            '🚪 خروج')
                    ),
                    React.createElement('div', { className: 'text-muted', style: { marginBottom: 14 } },
                        'کلاس: ' + (loadAll('class:').find(c => c.id === student.class_id)?.name || '—')
                    ),

                    React.createElement('h2', null, '📊 نمرات شما'),
                    results.length === 0 ?
                    React.createElement(EmptyState, { text: 'هنوز در آزمونی شرکت نکرده‌اید.' }) :
                    results.map(r =>
                        React.createElement('div', { className: 'list-item', key: r.title },
                            React.createElement('div', null,
                                React.createElement('div', { className: 'title' }, r.title),
                                React.createElement('div', { className: 'sub' }, r.date)
                            ),
                            React.createElement(Badge, { tone: r.pct >= 70 ? 'green' : r.pct >= 50 ?
                                    'orange' : 'red' }, r.pct + '%')
                        )
                    ),

                    messages.length > 0 &&
                    React.createElement('div', { className: 'border-top' },
                        React.createElement('h2', null, '💬 پیام‌های معلم'),
                        messages.map(m =>
                            React.createElement('div', { className: 'list-item', key: m.id },
                                React.createElement('div', null,
                                    React.createElement('div', { className: 'title' }, m.text),
                                    React.createElement('div', { className: 'sub' },
                                        new Date(m.created_at).toLocaleString('fa-IR'))
                                )
                            )
                        )
                    )
                );
            }

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { className: 'logo' }, '👨‍🎓'),
                React.createElement('h1', { style: { fontSize: 20, color: '#1A2A3A', marginBottom: 2 } },
                    'پرتال دانش‌آموزی'),
                React.createElement('div', { className: 'text-muted', style: { marginBottom: 16 } },
                    'کد خود را وارد کنید تا نمرات و پیام‌ها را ببینید.'),

                React.createElement(Field, { label: 'کد دانش‌آموزی' },
                    React.createElement(TextInput, {
                        value: code,
                        onChange: setCode,
                        placeholder: 'کد ۶ رقمی خود را وارد کنید',
                        onKeyDown: e => e.key === 'Enter' && lookup(),
                        style: { fontSize: 18, letterSpacing: 3, textAlign: 'center', fontWeight: 700 }
                    })
                ),

                error && React.createElement('div', { style: { color: '#DC2626', fontSize: 13, margin: '6px 0' } },
                    error),

                React.createElement(Button, { onClick: lookup, style: { width: '100%' } }, 'ورود به پرتال')
            );
        }

        // ============================================================
        //  اپلیکیشن اصلی
        // ============================================================

        function App() {
            const [teacher, setTeacher] = React.useState(null);
            const [view, setView] = React.useState('login');
            const [activeExamId, setActiveExamId] = React.useState(null);
            const [activeClassId, setActiveClassId] = React.useState(null);
            const [tab, setTab] = React.useState('dashboard');

            const refresh = () => {};

            const adminExists = loadAll('teacher:').length > 0;

            if (!teacher) {
                if (view === 'register' || !adminExists) {
                    return React.createElement(RegisterScreen, {
                        onRegistered: t => { setTeacher(t);
                            setView('dashboard'); },
                        goLogin: () => setView('login')
                    });
                }
                return React.createElement(LoginScreen, {
                    onLogin: t => { setTeacher(t);
                        setView('dashboard'); },
                    onRegister: () => setView('register')
                });
            }

            const navigate = (page, id) => {
                if (page === 'dashboard') { setView('dashboard');
                    setActiveExamId(null);
                    setActiveClassId(null); }
                if (page === 'exams') { setView('exams'); }
                if (page === 'questions' && id) { setView('questions');
                    setActiveExamId(id); }
                if (page === 'classes') { setView('classes'); }
                if (page === 'roster' && id) { setView('roster');
                    setActiveClassId(id); }
                if (page === 'students') { setView('students'); }
                if (page === 'results') { setView('results'); }
                if (page === 'messages') { setView('messages'); }
                if (page === 'teachers') { setView('teachers'); }
                if (page === 'all-exams') { setView('all-exams'); }
                if (page === 'all-results') { setView('all-results'); }
                if (page === 'student-portal') { setView('student-portal'); }
            };

            const exam = loadAll('exam:').find(e => e.id === activeExamId);
            const classroom = loadAll('class:').find(c => c.id === activeClassId);

            // ادمین
            if (teacher.role === 'admin') {
                if (view === 'teachers') {
                    return React.createElement(TeachersScreen, { teacher, onBack: () => setView('dashboard'),
                        refresh });
                }
                if (view === 'all-exams') {
                    return React.createElement(AllExamsScreen, { onBack: () => setView('dashboard'), refresh });
                }
                if (view === 'all-results') {
                    return React.createElement(AllResultsScreen, { onBack: () => setView('dashboard'), refresh });
                }
                if (view === 'student-portal') {
                    return React.createElement(StudentPortal, null);
                }
                return React.createElement(AdminDashboard, { teacher, onNavigate: navigate, refresh });
            }

            // معلم
            if (view === 'exams') {
                return React.createElement(ExamsScreen, { teacher, onBack: () => setView('dashboard'),
                    onNavigate: navigate, refresh });
            }
            if (view === 'questions' && exam) {
                return React.createElement(QuestionsScreen, { exam, onBack: () => setView('exams'), refresh });
            }
            if (view === 'classes') {
                return React.createElement(ClassesScreen, { teacher, onBack: () => setView('dashboard'),
                    onNavigate: navigate, refresh });
            }
            if (view === 'roster' && classroom) {
                return React.createElement(RosterScreen, { classroom, teacher, onBack: () => setView('classes'),
                    refresh });
            }
            if (view === 'students') {
                return React.createElement(StudentsScreen, { teacher, onBack: () => setView('dashboard'), refresh });
            }
            if (view === 'results') {
                return React.createElement(ResultsScreen, { teacher, onBack: () => setView('dashboard'), refresh });
            }
            if (view === 'messages') {
                return React.createElement(MessagesScreen, { teacher, onBack: () => setView('dashboard'), refresh });
            }
            if (view === 'student-portal') {
                return React.createElement(StudentPortal, null);
            }

            return React.createElement(TeacherDashboard, { teacher, onNavigate: navigate, refresh });
        }

        // ============================================================
        //  رندر
        // ============================================================

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
        console.log('🏫 سامانه کامل مدرسه با موفقیت اجرا شد!');
    </script>
</body>
  </html>

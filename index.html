<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سامانه آزمون مدرسه</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Vazirmatn', sans-serif;
      background: #F8FAFC;
      color: #1E293B;
      line-height: 1.6;
    }
    #root { min-height: 100vh; }
  </style>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // آیکون‌ها
    const Icon = ({ size = 24, color = "currentColor", children }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {children}
      </svg>
    );

    const GraduationCap = (p) => <Icon {...p}><path d="M22 10 12 5 2 10l10 5 10-5Z" /><path d="M6 12.5V17c0 1.5 2.7 3 6 3s6-1.5 6-3v-4.5" /><path d="M22 10v6" /></Icon>;
    const LayoutDashboard = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="9" rx="1" /><rect x="14" y="3" width="7" height="5" rx="1" /><rect x="14" y="12" width="7" height="9" rx="1" /><rect x="3" y="16" width="7" height="5" rx="1" /></Icon>;
    const FileText = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" /><path d="M14 2v6h6" /><path d="M9 13h6M9 17h6M9 9h1" /></Icon>;
    const Users = (p) => <Icon {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></Icon>;
    const BarChart3 = (p) => <Icon {...p}><path d="M3 3v18h18" /><rect x="7" y="12" width="3" height="6" /><rect x="12" y="8" width="3" height="10" /><rect x="17" y="5" width="3" height="13" /></Icon>;
    const Settings = (p) => <Icon {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 19.4 9c.13.36.35.68.62.94.28.28.6.5.96.62.36.13.75.13 1.02.13H22a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z" /></Icon>;
    const LogOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><path d="M16 17l5-5-5-5" /><path d="M21 12H9" /></Icon>;
    const Plus = (p) => <Icon {...p}><path d="M12 5v14M5 12h14" /></Icon>;
    const Trash2 = (p) => <Icon {...p}><path d="M3 6h18" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><path d="M10 11v6M14 11v6" /></Icon>;
    const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10" /><path d="M9 12l2 2 4-4" /></Icon>;
    const Circle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10" /></Icon>;
    const X = (p) => <Icon {...p}><path d="M18 6 6 18M6 6l12 12" /></Icon>;
    const Award = (p) => <Icon {...p}><circle cx="12" cy="8" r="6" /><path d="M8.7 13.9 7 22l5-3 5 3-1.7-8.1" /></Icon>;

    // توابع کمکی
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    const generateCode = (existing) => {
      let code;
      do { code = String(Math.floor(100000 + Math.random() * 900000)); } while (existing.includes(code));
      return code;
    };

    // localStorage helpers
    const db = {
      get: (key) => JSON.parse(localStorage.getItem(key) || 'null'),
      set: (key, value) => localStorage.setItem(key, JSON.stringify(value)),
      getAll: (prefix) => {
        const items = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith(prefix)) {
            items.push(JSON.parse(localStorage.getItem(key)));
          }
        }
        return items;
      },
      delete: (key) => localStorage.removeItem(key)
    };

    // کامپوننت‌های UI
    const Field = ({ label, children }) => (
      <div style={{ marginBottom: 16 }}>
        <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#3A4A63", marginBottom: 6 }}>{label}</label>
        {children}
      </div>
    );

    const inputStyle = {
      width: "100%", boxSizing: "border-box", padding: "11px 14px", borderRadius: 10,
      border: "1.5px solid #E2E8F0", fontSize: 14, outline: "none", fontFamily: "inherit",
      background: "#fff", color: "#1E293B",
    };

    const TextInput = (props) => <input {...props} style={{ ...inputStyle, ...(props.style || {}) }} />;

    const Button = ({ children, variant = "primary", style, ...rest }) => {
      const variants = {
        primary: { background: "#2563EB", color: "#fff", border: "none" },
        ghost: { background: "#fff", color: "#334155", border: "1.5px solid #E2E8F0" },
        danger: { background: "#FEF2F2", color: "#DC2626", border: "1.5px solid #FECACA" },
        success: { background: "#16A34A", color: "#fff", border: "none" },
      };
      return (
        <button {...rest} style={{
          ...variants[variant], padding: "10px 18px", borderRadius: 10, fontSize: 14,
          fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "inline-flex",
          alignItems: "center", gap: 6, ...style,
        }}>{children}</button>
      );
    };

    const Badge = ({ children, tone = "blue" }) => {
      const tones = {
        blue: { bg: "#EFF6FF", fg: "#2563EB" },
        green: { bg: "#F0FDF4", fg: "#16A34A" },
        orange: { bg: "#FFFBEB", fg: "#D97706" },
        red: { bg: "#FEF2F2", fg: "#DC2626" },
      };
      const t = tones[tone];
      return <span style={{ background: t.bg, color: t.fg, fontSize: 12, fontWeight: 700, padding: "4px 10px", borderRadius: 999 }}>{children}</span>;
    };

    // صفحه ورود
    function LoginScreen({ onLogin, onRegister }) {
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [role, setRole] = useState("teacher");

      const submit = () => {
        setError("");
        if (!username || !password) { setError("نام کاربری و رمز عبور را وارد کنید."); return; }
        const user = db.get(`user:${role}:${username}`);
        if (!user || user.password !== password) { setError("نام کاربری یا رمز عبور اشتباه است."); return; }
        onLogin(user);
      };

      return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg,#132A52,#1D3E73)", padding: 20 }}>
          <div style={{ width: "100%", maxWidth: 420, background: "#fff", borderRadius: 22, padding: "40px 36px" }}>
            <div style={{ textAlign: "center", marginBottom: 30 }}>
              <div style={{ width: 70, height: 70, borderRadius: 18, background: "#2563EB", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
                <GraduationCap size={36} color="#fff" />
              </div>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#1E293B" }}>سامانه آزمون مدرسه</div>
              <div style={{ fontSize: 13, color: "#64748B", marginTop: 6 }}>ورود به حساب کاربری</div>
            </div>

            <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
              <div onClick={() => setRole("admin")} style={{
                flex: 1, textAlign: "center", padding: "10px 4px", borderRadius: 10, cursor: "pointer", fontSize: 13, fontWeight: 700,
                background: role === "admin" ? "#2563EB" : "#F1F5F9", color: role === "admin" ? "#fff" : "#475569",
              }}>مدیر</div>
              <div onClick={() => setRole("teacher")} style={{
                flex: 1, textAlign: "center", padding: "10px 4px", borderRadius: 10, cursor: "pointer", fontSize: 13, fontWeight: 700,
                background: role === "teacher" ? "#2563EB" : "#F1F5F9", color: role === "teacher" ? "#fff" : "#475569",
              }}>معلم</div>
            </div>

            <Field label="نام کاربری">
              <TextInput value={username} onChange={(e) => setUsername(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} placeholder="نام کاربری" />
            </Field>
            <Field label="رمز عبور">
              <TextInput type="password" value={password} onChange={(e) => setPassword(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} placeholder="رمز عبور" />
            </Field>

            {error && <div style={{ color: "#DC2626", fontSize: 13, marginBottom: 14 }}>{error}</div>}

            <Button onClick={submit} style={{ width: "100%", justifyContent: "center", padding: "12px 0", fontSize: 15 }}>ورود</Button>

            <div style={{ textAlign: "center", marginTop: 20, fontSize: 13, color: "#64748B" }}>
              حساب ندارید؟{" "}
              <span onClick={onRegister} style={{ color: "#2563EB", fontWeight: 700, cursor: "pointer" }}>ثبت‌نام</span>
            </div>
          </div>
        </div>
      );
    }

    // صفحه ثبت‌نام
    function RegisterScreen({ onRegistered, onBack }) {
      const [fullname, setFullname] = useState("");
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [email, setEmail] = useState("");
      const [role, setRole] = useState("teacher");
      const [error, setError] = useState("");

      const submit = () => {
        setError("");
        if (!fullname || !username || !password || !email) { setError("همه فیلدها را پر کنید."); return; }
        const existing = db.get(`user:${role}:${username}`);
        if (existing) { setError("این نام کاربری قبلاً ثبت شده است."); return; }
        const user = { id: uid(), role, username, password, fullname, email, created_at: new Date().toISOString() };
        db.set(`user:${role}:${username}`, user);
        onRegistered(user);
      };

      return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg,#132A52,#1D3E73)", padding: 20 }}>
          <div style={{ width: "100%", maxWidth: 420, background: "#fff", borderRadius: 22, padding: "40px 36px" }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: "#1E293B", marginBottom: 6 }}>ثبت‌نام</div>
            <div style={{ fontSize: 13, color: "#64748B", marginBottom: 26 }}>اطلاعات خود را وارد کنید</div>

            <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
              <div onClick={() => setRole("admin")} style={{
                flex: 1, textAlign: "center", padding: "10px 4px", borderRadius: 10, cursor: "pointer", fontSize: 13, fontWeight: 700,
                background: role === "admin" ? "#2563EB" : "#F1F5F9", color: role === "admin" ? "#fff" : "#475569",
              }}>مدیر مدرسه</div>
              <div onClick={() => setRole("teacher")} style={{
                flex: 1, textAlign: "center", padding: "10px 4px", borderRadius: 10, cursor: "pointer", fontSize: 13, fontWeight: 700,
                background: role === "teacher" ? "#2563EB" : "#F1F5F9", color: role === "teacher" ? "#fff" : "#475569",
              }}>معلم</div>
            </div>

            <Field label="نام و نام‌خانوادگی">
              <TextInput value={fullname} onChange={(e) => setFullname(e.target.value)} placeholder="مثلاً: زهرا احمدی" />
            </Field>
            <Field label="نام کاربری">
              <TextInput value={username} onChange={(e) => setUsername(e.target.value)} placeholder="یک نام کاربری یکتا" />
            </Field>
            <Field label="رمز عبور">
              <TextInput type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="رمز عبور" />
            </Field>
            <Field label="ایمیل">
              <TextInput type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="ایمیل" />
            </Field>

            {error && <div style={{ color: "#DC2626", fontSize: 13, marginBottom: 14 }}>{error}</div>}

            <Button onClick={submit} style={{ width: "100%", justifyContent: "center", padding: "12px 0", fontSize: 15 }}>ثبت‌نام</Button>

            <div style={{ textAlign: "center", marginTop: 20, fontSize: 13, color: "#64748B" }}>
              قبلاً ثبت‌نام کردید؟{" "}
              <span onClick={onBack} style={{ color: "#2563EB", fontWeight: 700, cursor: "pointer" }}>ورود</span>
            </div>
          </div>
        </div>
      );
    }

    // داشبورد مدیر
    function AdminDashboard({ user, onLogout }) {
      const [view, setView] = useState("dashboard");
      const teachers = db.getAll("user:teacher:");
      const exams = db.getAll("exam:");
      const students = db.getAll("student:");

      const stats = {
        teachers: teachers.length,
        exams: exams.length,
        students: students.length,
      };

      return (
        <div style={{ display: "flex", minHeight: "100vh" }}>
          <div style={{ width: 230, background: "#0F172A", padding: "22px 12px", display: "flex", flexDirection: "column" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "0 8px 20px", borderBottom: "1px solid #1E293B", marginBottom: 20 }}>
              <div style={{ width: 34, height: 34, borderRadius: 9, background: "#F59E0B", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Award size={19} color="#fff" />
              </div>
              <span style={{ color: "#fff", fontWeight: 800, fontSize: 17 }}>پنل مدیر</span>
            </div>
            {[
              { key: "dashboard", label: "داشبورد", icon: LayoutDashboard },
              { key: "teachers", label: "معلمان", icon: Users },
              { key: "exams", label: "آزمون‌ها", icon: FileText },
              { key: "settings", label: "تنظیمات", icon: Settings },
            ].map((item) => (
              <div key={item.key} onClick={() => setView(item.key)} style={{
                display: "flex", alignItems: "center", gap: 10, padding: "11px 14px", borderRadius: 10, cursor: "pointer", marginBottom: 4,
                background: view === item.key ? "#F59E0B" : "transparent", color: view === item.key ? "#fff" : "#94A3B8",
                fontSize: 14, fontWeight: 600,
              }}>
                <item.icon size={17} />{item.label}
              </div>
            ))}
            <div style={{ marginTop: "auto", borderTop: "1px solid #1E293B", paddingTop: 12 }}>
              <div style={{ fontSize: 12, color: "#7C8CAE", padding: "6px 14px 12px" }}>{user.fullname}</div>
              <div onClick={onLogout} style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 14px", borderRadius: 10, cursor: "pointer", color: "#F87171", fontSize: 14, fontWeight: 600 }}>
                <LogOut size={17} />خروج
              </div>
            </div>
          </div>

          <div style={{ flex: 1, padding: "30px 34px", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 26 }}>
              <h1 style={{ fontSize: 24, fontWeight: 800, color: "#1E293B" }}>داشبورد مدیر</h1>
              <div style={{ width: 38, height: 38, borderRadius: "50%", background: "#F59E0B", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>
                {user.fullname[0]}
              </div>
            </div>

            {view === "dashboard" && (
              <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 24 }}>
                <div style={{ background: "#fff", borderRadius: 16, padding: "20px 22px", flex: 1, border: "1px solid #EEF1F6", minWidth: 180 }}>
                  <div style={{ fontSize: 13, color: "#64748B", fontWeight: 600, marginBottom: 10 }}>تعداد معلمان</div>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#1E293B" }}>{stats.teachers}</div>
                </div>
                <div style={{ background: "#fff", borderRadius: 16, padding: "20px 22px", flex: 1, border: "1px solid #EEF1F6", minWidth: 180 }}>
                  <div style={{ fontSize: 13, color: "#64748B", fontWeight: 600, marginBottom: 10 }}>تعداد آزمون‌ها</div>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#1E293B" }}>{stats.exams}</div>
                </div>
                <div style={{ background: "#fff", borderRadius: 16, padding: "20px 22px", flex: 1, border: "1px solid #EEF1F6", minWidth: 180 }}>
                  <div style={{ fontSize: 13, color: "#64748B", fontWeight: 600, marginBottom: 10 }}>تعداد دانش‌آموزان</div>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#1E293B" }}>{stats.students}</div>
                </div>
              </div>
            )}

            {view === "teachers" && (
              <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #EEF1F6", padding: 22 }}>
                <div style={{ fontSize: 18, fontWeight: 800, color: "#1E293B", marginBottom: 16 }}>معلمان ثبت‌نام شده</div>
                {teachers.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "40px 20px", color: "#64748B" }}>هنوز معلمی ثبت‌نام نکرده است.</div>
                ) : (
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <thead>
                      <tr style={{ textAlign: "right", color: "#64748B", fontSize: 12, fontWeight: 700 }}>
                        <th style={{ padding: "8px 6px" }}>نام</th>
                        <th style={{ padding: "8px 6px" }}>نام کاربری</th>
                        <th style={{ padding: "8px 6px" }}>ایمیل</th>
                        <th style={{ padding: "8px 6px" }}>تاریخ ثبت‌نام</th>
                      </tr>
                    </thead>
                    <tbody>
                      {teachers.map((t) => (
                        <tr key={t.id} style={{ borderTop: "1px solid #F1F5F9", fontSize: 14 }}>
                          <td style={{ padding: "12px 6px", fontWeight: 700 }}>{t.fullname}</td>
                          <td style={{ padding: "12px 6px", color: "#475569" }}>{t.username}</td>
                          <td style={{ padding: "12px 6px", color: "#475569" }}>{t.email}</td>
                          <td style={{ padding: "12px 6px", color: "#475569" }}>{new Date(t.created_at).toLocaleDateString("fa-IR")}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            )}

            {view === "exams" && (
              <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #EEF1F6", padding: 22 }}>
                <div style={{ fontSize: 18, fontWeight: 800, color: "#1E293B", marginBottom: 16 }}>همه آزمون‌ها</div>
                {exams.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "40px 20px", color: "#64748B" }}>هنوز آزمونی ساخته نشده است.</div>
                ) : (
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <thead>
                      <tr style={{ textAlign: "right", color: "#64748B", fontSize: 12, fontWeight: 700 }}>
                        <th style={{ padding: "8px 6px" }}>عنوان</th>
                        <th style={{ padding: "8px 6px" }}>معلم</th>
                        <th style={{ padding: "8px 6px" }}>تاریخ</th>
                      </tr>
                    </thead>
                    <tbody>
                      {exams.map((e) => {
                        const teacher = teachers.find((t) => t.username === e.teacher_id);
                        return (
                          <tr key={e.id} style={{ borderTop: "1px solid #F1F5F9", fontSize: 14 }}>
                            <td style={{ padding: "12px 6px", fontWeight: 700 }}>{e.title}</td>
                            <td style={{ padding: "12px 6px", color: "#475569" }}>{teacher?.fullname || "—"}</td>
                            <td style={{ padding: "12px 6px", color: "#475569" }}>{new Date(e.created_at).toLocaleDateString("fa-IR")}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // داشبورد معلم
    function TeacherDashboard({ user, onLogout }) {
      const [view, setView] = useState("dashboard");
      const [activeExamId, setActiveExamId] = useState(null);
      const [activeClassId, setActiveClassId] = useState(null);

      const myExams = db.getAll("exam:").filter((e) => e.teacher_id === user.username);
      const myClasses = db.getAll("class:").filter((c) => c.teacher_id === user.username);
      const myQuestions = db.getAll("question:").filter((q) => myExams.some((e) => e.id === q.exam_id));
      const myRoster = db.getAll("roster:").filter((r) => r.teacher_id === user.username);

      const refresh = () => setView(view);

      return (
        <div style={{ display: "flex", minHeight: "100vh" }}>
          <div style={{ width: 230, background: "#132A52", padding: "22px 12px", display: "flex", flexDirection: "column" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "0 8px 20px", borderBottom: "1px solid #22385F", marginBottom: 20 }}>
              <div style={{ width: 34, height: 34, borderRadius: 9, background: "#2563EB", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <GraduationCap size={19} color="#fff" />
              </div>
              <span style={{ color: "#fff", fontWeight: 800, fontSize: 17 }}>آزمون‌ساز</span>
            </div>
            {[
              { key: "dashboard", label: "داشبورد", icon: LayoutDashboard },
              { key: "exams", label: "آزمون‌ها", icon: FileText },
              { key: "classes", label: "کلاس‌ها", icon: Users },
              { key: "results", label: "نتایج", icon: BarChart3 },
              { key: "settings", label: "تنظیمات", icon: Settings },
            ].map((item) => (
              <div key={item.key} onClick={() => { setView(item.key); setActiveExamId(null); setActiveClassId(null); }} style={{
                display: "flex", alignItems: "center", gap: 10, padding: "11px 14px", borderRadius: 10, cursor: "pointer", marginBottom: 4,
                background: view === item.key ? "#2563EB" : "transparent", color: view === item.key ? "#fff" : "#AAB8D1",
                fontSize: 14, fontWeight: 600,
              }}>
                <item.icon size={17} />{item.label}
              </div>
            ))}
            <div style={{ marginTop: "auto", borderTop: "1px solid #22385F", paddingTop: 12 }}>
              <div style={{ fontSize: 12, color: "#7C8CAE", padding: "6px 14px 12px" }}>{user.fullname}</div>
              <div onClick={onLogout} style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 14px", borderRadius: 10, cursor: "pointer", color: "#F87171", fontSize: 14, fontWeight: 600 }}>
                <LogOut size={17} />خروج
              </div>
            </div>
          </div>

          <div style={{ flex: 1, padding: "30px 34px", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 26 }}>
              <h1 style={{ fontSize: 24, fontWeight: 800, color: "#1E293B" }}>داشبورد معلم</h1>
              <div style={{ width: 38, height: 38, borderRadius: "50%", background: "#2563EB", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>
                {user.fullname[0]}
              </div>
            </div>

            {view === "dashboard" && (
              <div>
                <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 24 }}>
                  <div style={{ background: "#fff", borderRadius: 16, padding: "20px 22px", flex: 1, border: "1px solid #EEF1F6", minWidth: 180 }}>
                    <div style={{ fontSize: 13, color: "#64748B", fontWeight: 600, marginBottom: 10 }}>آزمون‌ها</div>
                    <div style={{ fontSize: 28, fontWeight: 800, color: "#1E293B" }}>{myExams.length}</div>
                  </div>
                  <div style={{ background: "#fff", borderRadius: 16, padding: "20px 22px", flex: 1, border: "1px solid #EEF1F6", minWidth: 180 }}>
                    <div style={{ fontSize: 13, color: "#64748B", fontWeight: 600, marginBottom: 10 }}>کلاس‌ها</div>
                    <div style={{ fontSize: 28, fontWeight: 800, color: "#1E293B" }}>{myClasses.length}</div>
                  </div>
                  <div style={{ background: "#fff", borderRadius: 16, padding: "20px 22px", flex: 1, border: "1px solid #EEF1F6", minWidth: 180 }}>
                    <div style={{ fontSize: 13, color: "#64748B", fontWeight: 600, marginBottom: 10 }}>دانش‌آموزان</div>
                    <div style={{ fontSize: 28, fontWeight: 800, color: "#1E293B" }}>{myRoster.length}</div>
                  </div>
                </div>
                <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #EEF1F6", padding: 22 }}>
                  <div style={{ fontSize: 18, fontWeight: 800, color: "#1E293B", marginBottom: 16 }}>آزمون‌های اخیر</div>
                  {myExams.length === 0 ? (
                    <div style={{ textAlign: "center", padding: "40px 20px", color: "#64748B" }}>هنوز آزمونی نساخته‌اید.</div>
                  ) : (
                    <table style={{ width: "100%", borderCollapse: "collapse" }}>
                      <thead>
                        <tr style={{ textAlign: "right", color: "#64748B", fontSize: 12, fontWeight: 700 }}>
                          <th style={{ padding: "8px 6px" }}>عنوان</th>
                          <th style={{ padding: "8px 6px" }}>تاریخ</th>
                        </tr>
                      </thead>
                      <tbody>
                        {myExams.slice(0, 5).map((e) => (
                          <tr key={e.id} style={{ borderTop: "1px solid #F1F5F9", fontSize: 14 }}>
                            <td style={{ padding: "12px 6px", fontWeight: 700 }}>{e.title}</td>
                            <td style={{ padding: "12px 6px", color: "#475569" }}>{new Date(e.created_at).toLocaleDateString("fa-IR")}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  )}
                </div>
              </div>
            )}

            {view === "exams" && (
              <div>
                <Button onClick={() => {
                  const title = prompt("عنوان آزمون:");
                  if (!title) return;
                  const id = uid();
                  const exam = { id, title, teacher_id: user.username, created_at: new Date().toISOString() };
                  db.set(`exam:${id}`, exam);
                  refresh();
                }}>
                  <Plus size={16} />ساخت آزمون جدید
                </Button>
                <div style={{ marginTop: 20, display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px,1fr))", gap: 16 }}>
                  {myExams.map((ex) => (
                    <div key={ex.id} style={{ background: "#fff", borderRadius: 16, border: "1px solid #EEF1F6", padding: 20 }}>
                      <div style={{ fontSize: 16, fontWeight: 800, color: "#1E293B", marginBottom: 6 }}>{ex.title}</div>
                      <div style={{ fontSize: 12, color: "#64748B", marginBottom: 12 }}>ساخته‌شده {new Date(ex.created_at).toLocaleDateString("fa-IR")}</div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <Button variant="ghost" style={{ fontSize: 13, padding: "8px 12px" }} onClick={() => { setActiveExamId(ex.id); setView("questions"); }}>مدیریت سوالات</Button>
                        <Button variant="danger" style={{ fontSize: 13, padding: "8px 10px" }} onClick={() => {
                          if (confirm("آزمون حذف شود؟")) {
                            db.delete(`exam:${ex.id}`);
                            refresh();
                          }
                        }}><Trash2 size={14} /></Button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {view === "questions" && activeExamId && (
              <QuestionsManager examId={activeExamId} onBack={() => setView("exams")} refresh={refresh} />
            )}

            {view === "classes" && (
              <ClassesManager user={user} refresh={refresh} />
            )}

            {view === "results" && (
              <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #EEF1F6", padding: 22 }}>
                <div style={{ fontSize: 18, fontWeight: 800, color: "#1E293B", marginBottom: 16 }}>نتایج آزمون‌ها</div>
                <div style={{ textAlign: "center", padding: "40px 20px", color: "#64748B" }}>این بخش در حال توسعه است.</div>
              </div>
            )}

            {view === "settings" && (
              <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #EEF1F6", padding: 22, maxWidth: 420 }}>
                <div style={{ fontSize: 18, fontWeight: 800, color: "#1E293B", marginBottom: 16 }}>تنظیمات</div>
                <Field label="نام کاربری">
                  <TextInput value={user.username} disabled style={{ background: "#F8FAFC", color: "#94A3B8" }} />
                </Field>
                <Field label="نام و نام‌خانوادگی">
                  <TextInput value={user.fullname} disabled style={{ background: "#F8FAFC", color: "#94A3B8" }} />
                </Field>
              </div>
            )}
          </div>
        </div>
      );
    }

    // مدیریت سوالات
    function QuestionsManager({ examId, onBack, refresh }) {
      const exam = db.get(`exam:${examId}`);
      const [questions, setQuestions] = useState(db.getAll("question:").filter((q) => q.exam_id === examId));
      const [qType, setQType] = useState("mc");
      const [qText, setQText] = useState("");
      const [options, setOptions] = useState(["", "", "", ""]);
      const [correct, setCorrect] = useState(0);
      const [mark, setMark] = useState(1);

      const saveQuestion = () => {
        if (!qText.trim()) return;
        if ((qType === "mc") && options.some((o) => !o.trim())) return;
        const id = uid();
        const question = {
          id, exam_id: examId, type: qType, question_text: qText.trim(), mark: Number(mark) || 1,
        };
        if (qType === "mc") {
          question.option_a = options[0];
          question.option_b = options[1];
          question.option_c = options[2];
          question.option_d = options[3];
          question.correct_answer = ["A", "B", "C", "D"][correct];
        }
        db.set(`question:${id}`, question);
        setQuestions([...questions, question]);
        setQText("");
        setOptions(["", "", "", ""]);
        setCorrect(0);
        alert("سوال ذخیره شد!");
      };

      const removeQuestion = (id) => {
        if (!confirm("سوال حذف شود؟")) return;
        db.delete(`question:${id}`);
        setQuestions(questions.filter((q) => q.id !== id));
      };

      return (
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "#64748B", marginBottom: 16, cursor: "pointer" }} onClick={onBack}>
            ← بازگشت به آزمون‌ها
          </div>
          <div style={{ fontSize: 20, fontWeight: 800, color: "#1E293B", marginBottom: 20 }}>سوالات آزمون: {exam.title}</div>

          <div style={{ display: "flex", gap: 20, flexWrap: "wrap", marginBottom: 24 }}>
            <div style={{ flex: "1 1 420px", background: "#fff", borderRadius: 16, border: "1px solid #EEF1F6", padding: 22 }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#1E293B", marginBottom: 16 }}>افزودن سوال جدید</div>
              <Field label="نوع سوال">
                <div style={{ display: "flex", gap: 8 }}>
                  <div onClick={() => setQType("mc")} style={{
                    flex: 1, textAlign: "center", padding: "9px 4px", borderRadius: 10, cursor: "pointer", fontSize: 12, fontWeight: 700,
                    background: qType === "mc" ? "#2563EB" : "#F1F5F9", color: qType === "mc" ? "#fff" : "#475569",
                  }}>چهارگزینه‌ای</div>
                </div>
              </Field>
              <Field label="متن سوال">
                <textarea value={qText} onChange={(e) => setQText(e.target.value)} placeholder="متن سوال" rows={3} style={{ ...inputStyle, resize: "vertical", fontFamily: "inherit" }} />
              </Field>
              <Field label="گزینه‌ها">
                {options.map((opt, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                    <span onClick={() => setCorrect(i)} style={{ cursor: "pointer", color: correct === i ? "#16A34A" : "#CBD5E1" }}>
                      {correct === i ? <CheckCircle2 size={20} /> : <Circle size={20} />}
                    </span>
                    <span style={{ fontSize: 13, fontWeight: 700, color: "#64748B", width: 16 }}>{["A", "B", "C", "D"][i]}</span>
                    <TextInput value={opt} onChange={(e) => { const arr = [...options]; arr[i] = e.target.value; setOptions(arr); }} placeholder={`گزینه ${["A", "B", "C", "D"][i]}`} />
                  </div>
                ))}
              </Field>
              <Field label="نمره">
                <TextInput type="number" min={1} value={mark} onChange={(e) => setMark(e.target.value)} style={{ maxWidth: 120 }} />
              </Field>
              <Button onClick={saveQuestion} style={{ width: "100%", justifyContent: "center" }}>
                <Plus size={16} />افزودن سوال
              </Button>
            </div>

            <div style={{ flex: "1 1 420px" }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#1E293B", marginBottom: 16 }}>سوالات ({questions.length})</div>
              {questions.length === 0 ? (
                <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #EEF1F6", padding: 22, textAlign: "center", color: "#64748B" }}>هنوز سوالی اضافه نشده است.</div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {questions.map((q, idx) => (
                    <div key={q.id} style={{ background: "#fff", border: "1px solid #EEF1F6", borderRadius: 12, padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: "#1E293B" }}>{idx + 1}. {q.question_text}</div>
                        <div style={{ fontSize: 12, color: "#64748B", marginTop: 4 }}>پاسخ صحیح: {q.correct_answer} · نمره: {q.mark}</div>
                      </div>
                      <Trash2 size={16} style={{ cursor: "pointer", color: "#F87171" }} onClick={() => removeQuestion(q.id)} />
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // مدیریت کلاس‌ها
    function ClassesManager({ user, refresh }) {
      const [classes, setClasses] = useState(db.getAll("class:").filter((c) => c.teacher_id === user.username));
      const [activeClassId, setActiveClassId] = useState(null);

      const addClass = () => {
        const name = prompt("نام کلاس:");
        if (!name) return;
        const id = uid();
        const cls = { id, name: name.trim(), teacher_id: user.username, created_at: new Date().toISOString() };
        db.set(`class:${id}`, cls);
        setClasses([...classes, cls]);
      };

      const removeClass = (id) => {
        if (!confirm("کلاس و دانش‌آموزان آن حذف شوند؟")) return;
        db.delete(`class:${id}`);
        db.getAll("roster:").filter((r) => r.class_id === id).forEach((r) => db.delete(`roster:${r.id}`));
        setClasses(classes.filter((c) => c.id !== id));
        setActiveClassId(null);
      };

      if (activeClassId) {
        return <RosterManager classId={activeClassId} user={user} onBack={() => setActiveClassId(null)} refresh={refresh} />;
      }

      return (
        <div>
          <Button onClick={addClass}><Plus size={16} />افزودن کلاس</Button>
          <div style={{ marginTop: 20, display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px,1fr))", gap: 16 }}>
            {classes.map((c) => {
              const count = db.getAll("roster:").filter((r) => r.class_id === c.id).length;
              return (
                <div key={c.id} style={{ background: "#fff", borderRadius: 16, border: "1px solid #EEF1F6", padding: 20 }}>
                  <div style={{ fontSize: 16, fontWeight: 800, color: "#1E293B", marginBottom: 6 }}>{c.name}</div>
                  <div style={{ fontSize: 12, color: "#64748B", marginBottom: 16 }}>{count} دانش‌آموز</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <Button variant="ghost" style={{ fontSize: 13, padding: "8px 12px" }} onClick={() => setActiveClassId(c.id)}>مدیریت دانش‌آموزان</Button>
                    <Button variant="danger" style={{ fontSize: 13, padding: "8px 10px" }} onClick={() => removeClass(c.id)}><Trash2 size={14} /></Button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // مدیریت دانش‌آموزان کلاس
    function RosterManager({ classId, user, onBack, refresh }) {
      const cls = db.get(`class:${classId}`);
      const [roster, setRoster] = useState(db.getAll("roster:").filter((r) => r.class_id === classId));
      const [name, setName] = useState("");

      const addStudent = () => {
        if (!name.trim()) return;
        const allCodes = roster.map((r) => r.code);
        const id = uid();
        const code = generateCode(allCodes);
        const student = { id, class_id: classId, teacher_id: user.username, fullname: name.trim(), code, created_at: new Date().toISOString() };
        db.set(`roster:${id}`, student);
        setRoster([...roster, student]);
        setName("");
      };

      const removeStudent = (id) => {
        if (!confirm("دانش‌آموز حذف شود؟")) return;
        db.delete(`roster:${id}`);
        setRoster(roster.filter((r) => r.id !== id));
      };

      return (
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "#64748B", marginBottom: 16, cursor: "pointer" }} onClick={onBack}>
            ← بازگشت به کلاس‌ها
          </div>
          <div style={{ fontSize: 20, fontWeight: 800, color: "#1E293B", marginBottom: 20 }}>دانش‌آموزان کلاس: {cls.name}</div>

          <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #EEF1F6", padding: 22, marginBottom: 20 }}>
            <div style={{ fontSize: 14, fontWeight: 800, color: "#1E293B", marginBottom: 12 }}>افزودن دانش‌آموز</div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <TextInput value={name} onChange={(e) => setName(e.target.value)} placeholder="نام دانش‌آموز" onKeyDown={(e) => e.key === "Enter" && addStudent()} style={{ maxWidth: 260 }} />
              <Button onClick={addStudent}><Plus size={16} />افزودن</Button>
            </div>
          </div>

          <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #EEF1F6", padding: 22 }}>
            {roster.length === 0 ? (
              <div style={{ textAlign: "center", padding: "40px 20px", color: "#64748B" }}>هنوز دانش‌آموزی اضافه نشده است.</div>
            ) : (
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead>
                  <tr style={{ textAlign: "right", color: "#64748B", fontSize: 12, fontWeight: 700 }}>
                    <th style={{ padding: "8px 6px" }}>نام</th>
                    <th style={{ padding: "8px 6px" }}>کد ورود</th>
                    <th style={{ padding: "8px 6px" }}></th>
                  </tr>
                </thead>
                <tbody>
                  {roster.map((m) => (
                    <tr key={m.id} style={{ borderTop: "1px solid #F1F5F9", fontSize: 14 }}>
                      <td style={{ padding: "12px 6px", fontWeight: 700, color: "#1E293B" }}>{m.fullname}</td>
                      <td style={{ padding: "12px 6px" }}>
                        <span style={{ fontFamily: "monospace", fontSize: 16, fontWeight: 800, color: "#2563EB", letterSpacing: 2 }}>{m.code}</span>
                      </td>
                      <td style={{ padding: "12px 6px" }}>
                        <Trash2 size={16} style={{ cursor: "pointer", color: "#F87171" }} onClick={() => removeStudent(m.id)} />
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      );
    }

    // اپلیکیشن اصلی
    function EduExamApp() {
      const [user, setUser] = useState(() => db.get("currentUser"));
      const [authView, setAuthView] = useState("login");

      const handleLogin = (u) => {
        db.set("currentUser", u);
        setUser(u);
      };

      const handleLogout = () => {
        db.delete("currentUser");
        setUser(null);
        setAuthView("login");
      };

      if (!user) {
        if (authView === "register") {
          return <RegisterScreen onRegistered={handleLogin} onBack={() => setAuthView("login")} />;
        }
        return <LoginScreen onLogin={handleLogin} onRegister={() => setAuthView("register")} />;
      }

      if (user.role === "admin") {
        return <AdminDashboard user={user} onLogout={handleLogout} />;
      }

      return <TeacherDashboard user={user} onLogout={handleLogout} />;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<EduExamApp />);
  </script>
</body>
    </html>
